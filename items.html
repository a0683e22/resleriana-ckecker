            material => {
         
                if (
                    !materialUsageMap[
                        material.id
                    ]
                ) {
         
                    materialUsageMap[
                        material.id
                    ] = [];

                materialUsageMap[
                    material.id
                ].push(
                    recipe.target_id
                );
         
            }
         );

         .forEach(
         icon => {
         
         icon.addEventListener(
            'click',
            () => {
         
                const color =
                Number(
                    icon.dataset.color
                );
         
                if (
                    currentGiftColor === color
                ) {
         
                    currentGiftColor = null;
                }
                else {
         
                    currentGiftColor = color;
                }
         
                // ===== active =====
         
                document
                .querySelectorAll(
                    '.gift-filter-icon'
                )
                .forEach(
                    i =>
                    i.classList.remove(
                        'active'
                    )
                );
         
                if (currentGiftColor) {
         
                    icon.classList.add(
                        'active'
                    );
                }
         
                loadEquipment();
            }
         );
         
         }
         );
         //切換語言
         document
         .getElementById(
             'language-select'
         )
         .addEventListener(
             'change',
             e => {
         
                 currentLang =
                 e.target.value;
         
         updateLanguageUI();
                 loadEquipment();
             }
         );
         //搜尋
         document
         .getElementById(
             'search-input'
         )
         .addEventListener(
             'input',
             e => {
         
                 currentSearch =
                 e.target.value
                 .toLowerCase();
         
                 loadEquipment();
             }
         );
             // ===== material render =====
         function renderMaterials(recipe, currentEquipId) {
         
         if (!recipe) {
         
         const source =
         EQUIP_SOURCE[
            currentEquipId
         ] || 'event';
         
         return `
         
         <div class="event-reward">
            ${t(source)}
         </div>
         
         `;
         }
         
         return recipe.materials.map(
         material => {
         
            // ===== 角色碎片 =====
         
            if (material.type === 8) {
         
                return `
         
                <div
                    class="material-item"
                    data-material-id="${material.id}"
                >
         
                    <img
                        src="images/ui/shard_frame.webp"
                        class="shard-frame"
                    >
         
                    <img
                        src="images/ingredient/${material.id}.webp"
                        class="shard-image"
                    >
         
                    <div class="material-count">
                        x${material.quantity}
                    </div>
         
                </div>
         
                `;
            }
         
            // ===== 一般素材 =====
         
            const item =
            itemMap[
                material.id
            ];
         
            if (!item) {
                return '';
            }
         
            return `
         
            <div
                class="material-item"
                data-material-id="${material.id}"
            >
         
                <img
                    src="${getRarityBg(item.rarity)}"
                    class="material-bg"
                >
         
                <img
                    src="${item.image}"
                    class="material-image"
                >
         
                <div class="material-count">
                    x${material.quantity}
                </div>
         
            </div>
         
            `;
         }
         ).join('');
         }
         function renderGiftColors(recipe) {
         
         if (
         !recipe
         ||
         !recipe.gift_colors
         ) {
         
         return `
         
         <div class="gift-color-group empty">
         </div>
         
         `;
         }
         
         return `
         
         <div class="gift-color-group">
         
         ${
            recipe.gift_colors.map(
                color => `
         
                <img
                    src="${getGiftColorIcon(color)}"
                    class="gift-color-icon"
                >
         
                `
            ).join('')
         }
         
         </div>
         
         `;
         }
             // ===== equipment =====
         
             async function loadEquipment() {
         
         const response =
         await fetch(
         'data/equipment.json'
         );
         
         const data =
         await response.json();
         
         equipmentData = data;
         
         const container =
         document.getElementById(
         'equipment-list'
         );
         
         // ===== 排序 =====
         
         data.sort(
         (a, b) => {
         
            // ===== New → Old =====
         
            if (
                currentSort === 'desc'
            ) {
         
                return b.id - a.id;
            }
         
            // ===== Old → New =====
         
            if (
                currentSort === 'asc'
            ) {
         
                return a.id - b.id;
            }
         
            // ===== 狀態排序 =====
         
            const getStatValue = (
         equip,
         type
         ) => {
         
         const typeMap = {
         
         hp: 'HP',
         
         speed: 'Speed',
         
         physical_attack:
         'Physical Attack',
         
         magic_attack:
         'Magic Attack',
         
         physical_defense:
         'Physical Defense',
         
         magic_defense:
         'Magic Defense'
         
         };
         
         const targetType =
         typeMap[type];
         
         const stat =
         equip.status.find(
         s =>
         s.type === targetType
         );
         
         return stat
         ? stat.value
         : 0;
         };
         
            return (
                getStatValue(
                    b,
                    currentSort
                )
                -
                getStatValue(
                    a,
                    currentSort
                )
            );
         
         }
         );
         
         let filteredData = data;
         
         // ===== Rarity =====
         
         if (currentRarity) {
         
         filteredData =
         filteredData.filter(
            equip =>
            equip.rarity === currentRarity
         );
         }
         
         // ===== Type =====
         
         if (currentType) {
         
         filteredData =
         filteredData.filter(
            equip =>
            equip.slot_type === currentType
         );
         }
         
         // ===== Gift Color =====
         
         if (currentGiftColor) {
         
         filteredData =
         filteredData.filter(
            equip => {
         
                const recipe =
                recipeMap[equip.id];
         
                if (
                    !recipe
                    ||
                    !recipe.gift_colors
                ) {
         
                    return false;
                }
         
                return recipe.gift_colors.includes(
                    currentGiftColor
                );
         
            }
         );
         }
         
         // ===== Search =====
         
         if (currentSearch) {
         
         filteredData =
         filteredData.filter(
            equip =>
         
            equip.name
            .toLowerCase()
            .includes(
                currentSearch
            )
         );
         }
         
         // ===== Render =====
         
         container.innerHTML =
         filteredData.map(
         equip => {
         
            const recipe =
            recipeMap[
                equip.id
            ];
         
            return `
         
            <div class="equip-card" id="equip-${equip.id}">
         
                <div class="equip-left" onclick="copyText('${equip.name}')">
         
                    <img
                        src="${getRarityBg(equip.rarity)}"
                        class="equip-bg"
                    >
         
                    <img
                        src="${equip.image}"
                        class="equip-image"
                    >
         
                    <img
                        src="${getSlotIcon(equip.slot_type)}"
                        class="equip-slot-icon"
                    >
         
                    <div class="equip-release">
                        ${recipe ? recipe.start_at : ''}
                    </div>
         
                    <div class="equip-name">
                        ${equip.name}
                    </div>
         
                </div>
         
                <div class="equip-main">
         
                    <div class="equip-status">
         
                        ${
                            renderGiftColors(recipe)
                        }
         
                        ${
                            equip.status.map(
                                s => `
                                <div>
                                    ${getStatusText(s.type)}
                                    +${s.value}
                                </div>
                                `
                            ).join('')
                        }
         
                    </div>
         
                    <div class="equip-effect">
         
                        ${
                            equip.ability === 'None'
                            ? t('no_ability')
                            : equip.ability
                        }
         
                    </div>
         
                </div>
         
                <div class="equip-materials">
         
                    ${
                        renderMaterials(
                            recipe,
                            equip.id
                        )
                    }
         
                </div>
         
            </div>
         
            `;
         }
         ).join('');
         
         // ===== Material Click =====
         
         document
         .querySelectorAll(
         '.material-item'
         )
         .forEach(
         item => {
         
         item.addEventListener(
            'click',
            () => {
         
                showMaterialUsage(
                    Number(
                        item.dataset.materialId
                    )
                );
         
            }
         );
         
         }
         );
         }
         
         // ===== Sort =====
         
         document.getElementById(
         'filter-select'
         ).addEventListener(
         'change',
         e => {
         
         currentSort =
         e.target.value;
         
         loadEquipment();
         }
         );
         
         // ===== Search =====
         
         document.getElementById(
         'search-input'
         ).addEventListener(
         'input',
         e => {
         
         currentSearch =
         e.target.value
         .toLowerCase();
         
         loadEquipment();
         }
         );
         
         // ===== 初始載入 =====
         
         loadEquipment();
         updateLanguageUI();
         }
         init();
         checkPatchNote();

         function showMaterialUsage(materialId) {
         
         const usage =
         materialUsageMap[
         materialId
         ];
         
         if (
         !usage
         ||
         usage.length === 0
         ) {
         
         showToast(
            'No Usage'
         );
         
         return;
         }
         
         const usageList =
         document.getElementById(
         'usage-list'
         );
         
         usageList.innerHTML =
         usage.map(
         equipId => {
         
            const equip =
            equipmentData.find(
                e => e.id === equipId
            );
         
            if (!equip) {
                return '';
            }
         
            return `
         
            <div class="usage-item" onclick="scrollToEquip(${equip.id})">
         
                <img
                    src="${equip.image}"
                >
         
                <div class="usage-item-name">
                    ${equip.name}
                </div>
         
            </div>
         
            `;
         
         }
         ).join('');
         
         document
         .getElementById(
         'usage-modal'
         )
         .classList.add(
         'show'
         );
         }
         function copyText(text) {
         
         navigator.clipboard.writeText(text);
         
         showToast(
         t('copied') +
         `「${text}」`
         );
         }
         function showToast(message) {
         
         // ===== 建立 toast =====
         
         const toast =
         document.createElement('div');
         
         toast.textContent =
         message;
         
         toast.className =
         'copy-toast';
         
         document.body.appendChild(
         toast
         );
         
         // ===== 顯示動畫 =====
         
         setTimeout(
         () => {
         
            toast.classList.add(
                'show'
            );
         
         },
         10
         );
         
         // ===== 自動消失 =====
         
         setTimeout(
         () => {
         
            toast.classList.remove(
                'show'
            );
         
            setTimeout(
                () => {
         
                    toast.remove();
         
                },
                300
            );
         
         },
         1800
         );
         }
         
         // 切換語言顯示
         function getStatusText(type) {
         
             return t(
                 type
                 .toLowerCase()
                 .replaceAll(' ', '_')
             );
         }
         function t(key) {
         
             return (
                 TEXTS[
                     currentLang
                 ]?.[
                     key
                 ]
                 ||
                 key
             );
         }
         function updateLanguageUI() {
         
         document
         .querySelectorAll(
         '[data-i18n]'
         )
         .forEach(
         element => {
         
            const key =
            element.dataset.i18n;
         
            element.textContent =
            t(key);
         
         }
         );
         }
         function closeUsageModal() {
         
         document
         .getElementById(
         'usage-modal'
         )
         .classList.remove(
         'show'
         );
         }
         function scrollToEquip(equipId) {
         
         closeUsageModal();
         
         const target =
         document.getElementById(
         `equip-${equipId}`
         );
         
         if (!target) {
         return;
         }
         
         target.scrollIntoView({
         
         behavior: 'smooth',
         
         block: 'center'
         });
         
         // ===== Highlight =====
         
         target.classList.add(
         'equip-highlight'
         );
         
         setTimeout(
         () => {
         
            target.classList.remove(
                'equip-highlight'
            );
         
         },
         1800
         );
         }


function checkPatchNote() {

    const viewedVersion =
    localStorage.getItem(
        'patchNoteVersion'
    );

    if (
        viewedVersion !==
        PATCH_VERSION
    ) {

        document
        .getElementById(
            'patch-modal'
        )
        .classList.add(
            'show'
        );
    }
}
function closePatchModal() {

    localStorage.setItem(
        'patchNoteVersion',
        PATCH_VERSION
    );

    document
    .getElementById(
        'patch-modal'
    )
    .remove();
}
      </script>

   </body>
</html>

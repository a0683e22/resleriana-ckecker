<!DOCTYPE html>
<html lang="ja">
   <head>
      <meta charset="utf-8" />
      <meta content="width=device-width,initial-scale=1" name="viewport" />
      <title>Items</title>
      <link href="images/favicon2.ico" rel="icon" />
      <style>
         /* =========================
         Base Style
         ========================= */
         body {
         background: #1f2430;
         color: #fff;
         font-family: sans-serif;
         margin: 20px;
         overflow-x: auto;
         }
         button, select, input {
         font-family: inherit;
         }
         /* =========================
         Control Panel (主控台)
         ========================= */
         .control-panel {
         width: 1280px;
         margin: 0 auto 20px;
         padding: 16px 20px;
         border-radius: 16px;
         background: #4b556f;
         display: flex;
         flex-direction: column;
         gap: 16px;
         position: sticky;
         top: 0;
         z-index: 100;
         box-sizing: border-box;
         }
         .top-row, .bottom-row {
         display: flex;
         align-items: center;
         justify-content: space-between;
         gap: 20px;
         }
         #dynamic-controls, #dynamic-bottom-controls {
         display: flex;
         align-items: center;
         gap: 12px;
         flex-wrap: wrap;
         }
         .right-controls {
         display: flex;
         align-items: center;
         gap: 12px;
         margin-left: auto;
         }
         .search-input {
         width: 420px;
         height: 40px;
         padding: 0 14px;
         border: none;
         border-radius: 8px;
         background: #2f374a;
         color: #fff;
         font-size: 18px;
         }
         .sort-select, #language-select {
         height: 40px;
         padding: 0 12px;
         border: none;
         border-radius: 8px;
         background: #2f374a;
         color: #fff;
         font-size: 16px;
         }
         .filter-group {
         display: flex;
         align-items: center;
         gap: 10px;
         }
         .filter-btn {
         height: 38px;
         padding: 0 16px;
         border: none;
         border-radius: 10px;
         background: #69758f;
         color: #fff;
         font-size: 15px;
         font-weight: 700;
         cursor: pointer;
         transition: .2s;
         }
         .filter-btn:hover { background: #8291b2; }
         .filter-btn.active {
         background: linear-gradient(180deg, #9db6ff, #7f96d9);
         color: #fff;
         box-shadow: 0 0 14px rgba(157, 182, 255, 0.55);
         border: 1px solid rgba(255, 255, 255, 0.35);
         }
         .gift-filter-icon {
         width: 32px;
         height: 32px;
         object-fit: contain;
         cursor: pointer;
         transition: 0.2s;
         }
         .gift-filter-icon.active {
         transform: scale(1.15);
         filter: drop-shadow(0 0 6px #fff);
         }
         .category-tabs { display: flex; gap: 10px; }
         .category-tab {
         height: 42px;
         padding: 0 18px;
         border: none;
         border-radius: 10px;
         background: #69758f;
         color: #fff;
         font-size: 16px;
         font-weight: 700;
         cursor: pointer;
         }
         .category-tab.active { background: #9db6ff; }
         .home-link { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; }
         .home-icon { width: 100%; height: 100%; border-radius: 14px; object-fit: contain; }
         /* =========================
         Layouts (寬度均為 1280px)
         ========================= */
         #main-list {
         width: 1280px;
         margin: 0 auto;
         }
         .list-flex-wrapper {
         display: flex;
         flex-direction: column;
         align-items: center;
         gap: 12px;
         width: 100%;
         }
         /* 裝備 & 戰鬥 橫條卡片 */
         .equip-card {
         width: 100%;
         display: flex;
         gap: 16px;
         background: #3e4658;
         border-radius: 12px;
         padding: 12px;
         position: relative;
         box-sizing: border-box;
         }
         .equip-left {
         position: relative;
         width: 180px;
         height: 220px;
         flex-shrink: 0;
         }
         .equip-bg { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
         .equip-image {
         position: absolute;
         top: 46%;
         left: 50%;
         transform: translate(-50%, -50%);
         width: 120px;
         height: 120px;
         object-fit: contain;
         }
         .equip-slot-icon { position: absolute; top: 4px; right: 4px; width: 34px; height: 34px; }
         .equip-name {
         position: absolute;
         bottom: 8px;
         width: 100%;
         text-align: center;
         font-size: 15px;
         font-weight: 700;
         color: #fff;
         text-shadow: 0 0 4px #000;
         }
         .equip-release {
         position: absolute;
         top: 4px;
         left: 4px;
         padding: 2px 6px;
         border-radius: 6px;
         background: rgba(0, 0, 0, 0.6);
         font-size: 12px;
         color: #fff;
         font-weight: 700;
         z-index: 2;
         }
         .battle-attr-label {
         position: absolute;
         bottom: 32px;
         left: 8px;
         background: rgba(0, 0, 0, 0.7);
         padding: 2px 6px;
         border-radius: 4px;
         font-size: 12px;
         color: #ffd36b;
         }
         .battle-usage-label {
         position: absolute;
         bottom: 32px;
         right: 8px;
         background: rgba(0, 0, 0, 0.7);
         padding: 2px 6px;
         border-radius: 4px;
         font-size: 12px;
         color: #fff;
         }
         .equip-main {
         flex: 1;
         display: flex;
         flex-direction: column;
         justify-content: center;
         gap: 10px;
         padding-left: 10px;
         }
         .equip-status { display: flex; gap: 18px; font-size: 20px; color: #fff; font-weight: 700; align-items: center; flex-wrap: wrap; }
         .equip-effect { font-size: 24px; line-height: 1.4; color: #dfe8ff; }
         .equip-materials { width: 260px; display: flex; justify-content: flex-end; align-items: center; gap: 8px; flex-shrink: 0; }
         .material-item { position: relative; width: 72px; height: 72px; cursor: pointer; border-radius: 4px; }
         .material-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
         .material-image { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 44px; height: 44px; object-fit: contain; z-index: 2;}
         .material-bg.shard-bg { transform: scale(1.18); z-index: 1; }
         .material-count { position: absolute; bottom: -4px; right: 2px; font-size: 16px; font-weight: 700; color: #fff; text-shadow: 0 0 4px #000; }
         .gift-color-group { display: flex; align-items: center; gap: 6px; }
         .gift-color-icon { width: 24px; height: 24px; object-fit: contain; }
         /* 戰鬥 專用素質面板 */
         .battle-tool-status { display: flex; gap: 20px; align-items: center; }
         .battle-status-block { display: flex; align-items: center; gap: 6px; font-size: 20px; font-weight: 700; }
         .battle-power-icon { width: 34px; height: 34px; }
         /* =========================
         Material Grid Mode (4行格子)
         ========================= */
         .material-grid {
         display: grid;
         grid-template-columns: repeat(4, 310px);
         gap: 13px;
         width: 100%;
         }
         .material-card {
         display: flex;
         align-items: center;
         gap: 12px;
         background: #3e4658;
         border-radius: 12px;
         padding: 10px;
         box-sizing: border-box;
         height: 110px;
         }
         .material-left { position: relative; width: 80px; height: 90px; flex-shrink: 0; cursor: pointer; }
         .material-rarity-bg { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
         .material-main-image { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 64px; height: 64px; object-fit: contain; }
         .material-content { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
         .material-name-row { display: flex; align-items: center; gap: 6px; justify-content: space-between; }
         .material-name { font-size: 17px; font-weight: 700; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
         .material-color-icon { width: 24px; height: 24px; flex-shrink: 0; }
         .material-traits { display: flex; flex-direction: column; gap: 2px; }
         .material-trait { font-size: 13px; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #ffd39b; }
         .material-trait:hover { text-decoration: underline; }
         /* =========================
         Modals & Toast
         ========================= */
         .copy-toast {
         position: fixed;
         left: 50%;
         bottom: 40px;
         transform: translateX(-50%) translateY(20px);
         background: rgba(20, 20, 30, 0.92);
         color: #fff;
         padding: 12px 20px;
         border-radius: 12px;
         font-size: 16px;
         font-weight: 700;
         opacity: 0;
         transition: all 0.3s ease;
         z-index: 1000;
         }
         .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
         .usage-modal {
         position: fixed;
         inset: 0;
         background: rgba(0, 0, 0, 0.6);
         display: none;
         justify-content: center;
         align-items: center;
         z-index: 500;
         }
         .usage-modal.show { display: flex; }
         .usage-modal-content {
         width: 700px;
         max-height: 80vh;
         overflow-y: auto;
         background: #3e4658;
         border-radius: 18px;
         padding: 24px;
         box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
         }
         .usage-modal-title { font-size: 26px; font-weight: 700; margin-bottom: 18px; border-bottom: 2px solid #525f7a; padding-bottom: 8px; }
         .trait-description-box {
         background: #232a3b;
         border-left: 4px solid #9db6ff;
         padding: 12px 16px;
         border-radius: 6px;
         font-size: 16px;
         line-height: 1.5;
         color: #e2e8f0;
         margin-bottom: 20px;
         }
         .usage-item {
         display: flex;
         align-items: center;
         gap: 16px;
         padding: 12px;
         border-radius: 10px;
         background: #2f374a;
         margin-bottom: 10px;
         cursor: pointer;
         }
         .usage-item img { width: 50px; height: 50px; object-fit: contain; }
         .usage-item-name { font-size: 18px; font-weight: 700; }
         .usage-close-btn {
         margin-top: 16px;
         width: 100%;
         height: 44px;
         border: none;
         border-radius: 10px;
         background: #7487b8;
         color: #fff;
         font-size: 16px;
         font-weight: 700;
         cursor: pointer;
         }
         .equip-highlight { animation: equipFlash 1.5s ease; }
         @keyframes equipFlash {
         0% { box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
         30% { box-shadow: 0 0 25px rgba(255, 255, 255, 0.8); }
         100% { box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
         }
         .type-icon-btn { width: 42px; height: 42px; padding: 0; background: transparent; border: none; box-shadow: none; display: flex; align-items: center; justify-content: center; }
         .type-icon-btn img { width: 48px; height: 48px; object-fit: contain; }
      </style>
   </head>
   <body>
      <div class="control-panel">
         <div class="top-row">
            <div id="dynamic-controls"></div>
            <div class="right-controls">
               <div class="category-tabs">
                  <button class="category-tab active" data-category="equipment">裝備</button>
                  <button class="category-tab" data-category="battle_item">戰鬥 </button>
                  <button class="category-tab" data-category="material">素材</button>
               </div>
               <a class="home-link" href="index.html">
               <img class="home-icon" src="images/ui/home.webp" alt="Home" />
               </a>
               <select id="language-select">
                  <option value="zh">zh-TW</option>
                  <option value="ja">JA</option>
                  <option value="en">EN</option>
               </select>
            </div>
         </div>
         <div class="bottom-row">
            <div id="dynamic-bottom-controls"></div>
         </div>
      </div>
      <div id="main-list"></div>
      <div class="usage-modal" id="usage-modal">
         <div class="usage-modal-content">
            <div class="usage-modal-title" id="usage-modal-title">可製作的配方列表</div>
            <div id="usage-list"></div>
            <button class="usage-close-btn" onclick="closeUsageModal()">關閉</button>
         </div>
      </div>
      <div class="usage-modal" id="trait-modal">
         <div class="usage-modal-content" style="width: 1330px;">
            <div class="usage-modal-title" id="trait-modal-title">具備此特性的素材</div>
            <div class="trait-description-box" id="trait-modal-desc"></div>
            <div id="trait-usage-list"></div>
            <button class="usage-close-btn" onclick="closeTraitModal()">關閉</button>
         </div>
      </div>
      <script>
         /* ==========================================
            全域變數與狀態
            ========================================== */
         let currentCategory = 'equipment';
         let currentSearch = "";
         let currentSort = "desc";
         let currentRarity = null;
         let currentType = null;
         let currentGiftColor = null;
         let currentLang = "zh";
         
         let selectedMaterialRarity = null;
         let selectedMaterialColor = null;
         
         // 💡 在此處設定「活動取得」與「商城販售」的裝備 ID 清單
         const EVENT_EQUIP_IDS = [766, 767, 780, 793, 812, 813, 853, 854, 879, 880, 947, 978, 1010, 1194, 1195, 1196, 1197, 1198, 1199, 1200, 1201]; // 活動裝備 ID
         const SHOP_EQUIP_IDS = [838, 839, 840];  // 商城新手裝ID
         
         // 工房砲素材 ID 手動管理大清單
         const ATELIER_CANNON_IDS = [...Array.from({ length: 1337 - 1320 + 1 }, (_, i) => 1320 + i), 1383, 1384];
         
         const colorPriorityMap = {
           1: [1, 2, 3, 4, 5], 2: [2, 3, 4, 5, 1], 3: [3, 4, 5, 1, 2], 4: [4, 5, 1, 2, 3], 5: [5, 1, 2, 3, 4]
         };
         
         // 核心資料庫
         let equipmentData = [];
         let battleToolData = [];
         let itemData = [];
         let recipeMasterData = [];
         let traitMasterData = { battle_tool_traits: {}, equipment_tool_traits: {} };
         
         let itemUsageMap = {}; 
         
         /* ==========================================
            語系轉換對應 (中文:zh, 英文:en, 日文:jp)
            ========================================== */
         function getLangKey(lang) {
           if (lang === 'zh') return 'zh';
           if (lang === 'ja') return 'jp'; 
           if (lang === 'en') return 'en';
           return 'zh';
         }
         
         /* ==========================================
            🧱 素材背景圖核心判定
            ========================================== */
         function getMaterialBgPath(item) {
           if (item && item.type === 8) {
             return "images/ui/shard_frame.webp";
           }
           const rarity = (item ? item.rarity : 'R').toLowerCase();
           return `images/ui/${rarity}.webp`;
         }
         
         /* ==========================================
            主控台配置 (CATEGORY_CONFIG)
            ========================================== */
         const CATEGORY_CONFIG = {
           equipment: {
             search: true,
             sortOptions: [
               { value: 'desc', labelKey: 'new_old' }, { value: 'asc', labelKey: 'old_new' },
               { value: 'hp', labelKey: 'hp' }, { value: 'speed', labelKey: 'speed' },
               { value: 'physical_attack', labelKey: 'physical_attack' }, { value: 'magic_attack', labelKey: 'magic_attack' },
               { value: 'physical_defense', labelKey: 'physical_defense' }, { value: 'magic_defense', labelKey: 'magic_defense' }
             ],
             rarity: ['UR', 'SSR', 'SR', 'R'],
             types: [{ value: 'Weapon', labelKey: 'weapon' }, { value: 'Armor', labelKey: 'armor' }, { value: 'Accessory', labelKey: 'accessory' }],
             useColors: true
           },
           battle_item: {
             search: true,
             sortOptions: [
               { value: 'desc', labelKey: 'new_old' }, 
               { value: 'asc', labelKey: 'old_new' },
               { value: 'type_1', labelKey: 'attack_first' },
               { value: 'type_2', labelKey: 'buff_first' },
               { value: 'type_3', labelKey: 'debuff_first' },
               { value: 'type_4', labelKey: 'heal_first' }
             ],
             rarity: ['SSR', 'SR', 'R'],
             types: [{ value: 1, icon: 'attack.webp' }, { value: 2, icon: 'buff.webp' }, { value: 3, icon: 'debuff.webp' }, { value: 4, icon: 'heal.webp' }],
             useColors: true
           },
           material: {
             search: false,
             sortOptions: [
               { value: 'desc', labelKey: 'new_old' }, { value: 'asc', labelKey: 'old_new' },
               { value: 'red', labelKey: 'red_first' }, { value: 'blue', labelKey: 'blue_first' },
               { value: 'green', labelKey: 'green_first' }, { value: 'yellow', labelKey: 'yellow_first' },
               { value: 'purple', labelKey: 'purple_first' }
             ],
             rarity: ['SSR', 'SR', 'R'],
             types: [],
             useColors: true
           }
         };
         
         /* ==========================================
            萬用渲染配置核心 (RENDER_CONFIG)
            ========================================== */
         const RENDER_CONFIG = {
           equipment: {
             layoutMode: 'flex',
             getLeftPart: (item) => {
               const slotMap = { Weapon: "weapon.webp", Armor: "armor.webp", Accessory: "accessory.webp" };
               const slotIconHtml = item.slot_type ? `<img src="images/ui/${slotMap[item.slot_type]}" class="equip-slot-icon">` : '';
               
               const rcp = recipeMasterData.find(r => r.name === item.name || r.target_id === item.id);
               const dateHtml = rcp && rcp.start_at ? `<div class="equip-release">${rcp.start_at.split(' ')[0]}</div>` : '';
               const bgPath = `images/ui/${(item.rarity || 'r').toLowerCase()}.webp`;
         
               return `
                 ${dateHtml}
                 <div class="equip-left" onclick="copyText('${item.name}')" style="cursor:pointer;">
                   <img src="${bgPath}" class="equip-bg">
                   <img src="${item.image?.trim()}" class="equip-image" loading="lazy">
                   ${slotIconHtml}
                   <div class="equip-name">${item.name}</div>
                 </div>
               `;
             },
             renderMain: (item) => {
               let statusHtml = item.status.map(s => `<span>${getStatusText(s.type)} +${s.value}</span>`).join("");
               const rcp = recipeMasterData.find(r => r.name === item.name);
               if (rcp && rcp.gift_colors) {
                 statusHtml += `<div class="gift-color-group" style="margin-left:auto;">
                   ${rcp.gift_colors.map(cId => `<img class="gift-color-icon" src="${getColorIcon(cId)}">`).join("")}
                 </div>`;
               }
         const abilityText = item.ability || t("no_ability");
               return `
                 <div class="equip-status">${statusHtml}</div>
                 <div class="equip-effect">${item.ability || t("no_ability")}</div>
               `;
             },
             renderRight: (item) => {
               // 💡 核心修改：判斷入手管道並在素材區域顯示對應文字
               if (EVENT_EQUIP_IDS.includes(Number(item.id))) {
                 return `<div style="font-size: 22px; font-weight: bold; color: #ffb84d; width: 260px; text-align: right; padding-right: 12px; letter-spacing: 1px;">${t('event_obtain')}</div>`;
               }
               if (SHOP_EQUIP_IDS.includes(Number(item.id))) {
                 return `<div style="font-size: 22px; font-weight: bold; color: #4da6ff; width: 260px; text-align: right; padding-right: 12px; letter-spacing: 1px;">${t('shop_obtain')}</div>`;
               }
         
               // 若不是活動或商城裝，則照舊顯示製作素材小框
               const rcp = recipeMasterData.find(r => r.name === item.name);
               if (!rcp || !rcp.materials) return '';
               return rcp.materials.map(mat => {
                 const targetMat = itemData.find(i => i.id === mat.id);
                 const matBgPath = mat.type === 8 ? "images/ui/shard_frame.webp" : getMaterialBgPath(targetMat);
                 
                 let imgPath = targetMat ? targetMat.image?.trim() : '';
                 if (mat.type === 8) {
                   imgPath = `images/ingredient/${mat.id}.webp`;
                 }
         
                 return `
                   <div class="material-item" onclick="showMaterialUsage(${mat.id})">
                     <img src="${matBgPath}" class="material-bg ${mat.type === 8 ? 'shard-bg' : ''}">
                     <img src="${imgPath}" class="material-image">
                     <div class="material-count">${mat.quantity}</div>
                   </div>
                 `;
               }).join("");
             }
           },
         
           battle_item: {
             layoutMode: 'flex',
             getLeftPart: (item) => {
               const filterTypeMap = { 1: "attack.webp", 2: "buff.webp", 3: "debuff.webp", 4: "heal.webp" };
               const typeId = Number(item.trait_filter_ids);
               let typeIconHtml = '';
         
               if (typeId >= 1 && typeId <= 4 && filterTypeMap[typeId]) {
                 typeIconHtml = `<img src="images/ui/${filterTypeMap[typeId]}" class="equip-slot-icon" style="position: absolute; top: 6px; right: 6px; width: 32px; height: 32px; object-fit: contain;">`;
               }
         
               const attrImgMap = {
                 1: "s.42817b.png",  // 斬
                 2: "k.3148cc.png",  // 打
                 3: "t.ac73b3.png",  // 突
                 5: "f.1dbf47.png",  // 火
                 6: "i.b647e3.png",  // 冰
                 7: "l.119818.png",  // 雷
                 8: "w.d06628.png"   // 風
               };
         
               let attrHtml = '';
               if (item.attack_attributes !== null && typeof item.attack_attributes === 'number' && attrImgMap[item.attack_attributes]) {
                 attrHtml = `<img src="images/attr/${attrImgMap[item.attack_attributes]}" class="battle-attr-label" style="background:transparent; width:32px; height:32px; object-fit:contain;">`;
               }
         
               const rarityMap = { 1: "r", 2: "sr", 3: "ssr" };
               const bgPath = `images/ui/${rarityMap[item.rarity] || 'r'}.webp`;
         
               return `
                 <div class="equip-left" onclick="copyText('${item.name}')" style="cursor:pointer; position: relative;">
                   <img src="${bgPath}" class="equip-bg">
                   <img src="${item.image?.trim()}" class="equip-image" loading="lazy">
                   ${typeIconHtml}
                   ${attrHtml}
                   <div class="battle-usage-label">${item.usage_count}</div>
                   <div class="equip-name">${item.name}</div>
                 </div>
               `;
             },
             renderMain: (item) => {
               const rValues = { 1: '-', 2: '-', 3: '-' };
               if (item.power !== null && item.power !== undefined) {
                 (item.power_types || []).forEach((pType, idx) => {
                   const hasPercent = item.show_percent?.[idx] === 1;
                   rValues[pType] = hasPercent ? `+${item.power}%` : `+${item.power}`;
                 });
               }
         
               let statusHtml = `
                 <div class="battle-tool-status">
                   <div class="battle-status-block"><img class="battle-power-icon" src="images/ui/power2.png"><span>${rValues[1]}</span></div>

               const rcp = recipeMasterData.find(r => r.name === item.name);

               return `

             },
             renderRight: (item) => {
               const rcp = recipeMasterData.find(r => r.name === item.name);
               if (!rcp || !rcp.materials) return '';
               return rcp.materials.map(mat => {
                 const targetMat = itemData.find(i => i.id === mat.id);
                 const matBgPath = mat.type === 8 ? "images/ui/shard_frame.webp" : getMaterialBgPath(targetMat);

                 if (mat.type === 8) {

                 return `
                   <div class="material-item" onclick="showMaterialUsage(${mat.id})">

             renderGridCard: (item) => {

               if (item.battle_tool_trait_ids && item.battle_tool_trait_ids.length > 0) {

                   if (id && id !== 0) traitHtmls.push(`<div class="material-trait" onclick="showTraitUsage(${id}, 'battle')">🧪 ${name}</div>`);
                 });
               } else if (item.equipment_tool_trait_ids && item.equipment_tool_trait_ids.length > 0) {
                 item.equipment_tool_trait_ids.forEach(t => {
                   const id = typeof t === "object" ? t?.id : t, k = getLangKey(currentLang), name = traitMasterData.equipment_tool_traits?.[id]?.[k] ?? `Trait ${id}`;
                   if (id && id !== 0) traitHtmls.push(`<div class="material-trait" onclick="showTraitUsage(${id}, 'equipment')">⚔️ ${name}</div>`);
                 });
               }
         
               const matBgPath = getMaterialBgPath(item);
         
               return `
                 <div class="material-card">
                   <div class="material-left" onclick="showMaterialUsage(${item.id})">
                     <img src="${matBgPath}" class="material-rarity-bg">
                     <img src="${item.image?.trim()}" class="material-main-image" loading="lazy">

                   <div class="material-content">

                       <div class="material-name" onclick="copyText('${item.name}')">${item.name}</div>

                     </div>
                     <div class="material-traits">
                       ${traitHtmls.join("")}

                   </div>
                 </div>
               `;
             }
           }
         };
         
         /* ==========================================

         function renderCategoryView(category, dataList, targetElementId = "main-list") {
           const container = document.getElementById(targetElementId);
           const cfg = RENDER_CONFIG[category];
           if (!cfg || !container) return;
         
           if (cfg.layoutMode === 'grid') {
             container.innerHTML = `<div class="material-grid">${dataList.map(item => cfg.renderGridCard(item)).join("")}</div>`;
           } else {
             container.innerHTML = `
               <div class="list-flex-wrapper">
                 ${dataList.map(item => `
                   <div class="equip-card" id="${category}-${item.id}">
                     ${cfg.getLeftPart(item)}
                     <div class="equip-main">${cfg.renderMain(item)}</div>
                     <div class="equip-materials">${cfg.renderRight(item)}</div>
                   </div>
                 `).join("")}
               </div>
             `;
           }
         }
         
         /* ==========================================
            主控台核心控制與過濾
            ========================================== */
         function switchControlPanel(category) {
           const config = CATEGORY_CONFIG[category];
           const topContainer = document.getElementById('dynamic-controls');
           const bottomContainer = document.getElementById('dynamic-bottom-controls');
         
           currentSearch = "";
           currentSort = config.sortOptions[0]?.value || "desc";
           currentRarity = null;
           currentType = null;
           currentGiftColor = null;
           selectedMaterialRarity = null;
           selectedMaterialColor = null;
         
           let topHtml = '';
           if (config.search) {
             topHtml += `<input type="text" id="search-input" class="search-input" placeholder="搜尋名稱..." oninput="handleSearch(this.value)">`;
           }
         
           if (category === 'material') {
             const activeNormal = currentType === 'normal' ? 'active' : '';
             const activeCannon = currentType === 'cannon' ? 'active' : '';
         
             topHtml += `
               <div class="filter-group" style="margin-right: 4px;">
                 <button class="filter-btn ${activeNormal}" data-type="normal" onclick="handleMaterialTopTypeClick(this, 'normal')">${t('normal_material')}</button>

           if (config.sortOptions && config.sortOptions.length > 0) {
             topHtml += `

               </select>
             `;
           }
           topContainer.innerHTML = topHtml;
         
           let bottomHtml = '';

             bottomHtml += `

           }
           if (config.types && config.types.length > 0) {
             bottomHtml += `

               </div>
             `;
           }
           if (config.useColors) {
             bottomHtml += `
               <div class="filter-group">
                 <img class="gift-filter-icon" data-color="1" src="images/ui/blue.png" onclick="handleColorClick(this, 1)">
                 <img class="gift-filter-icon" data-color="2" src="images/ui/purple.png" onclick="handleColorClick(this, 2)">
                 <img class="gift-filter-icon" data-color="3" src="images/ui/yellow.png" onclick="handleColorClick(this, 3)">
                 <img class="gift-filter-icon" data-color="4" src="images/ui/red.png" onclick="handleColorClick(this, 4)">
                 <img class="gift-filter-icon" data-color="5" src="images/ui/green.png" onclick="handleColorClick(this, 5)">
               </div>
             `;

         function handleSearch(val) { currentSearch = val.toLowerCase().trim(); refreshView(); }
         function handleSort(val) { currentSort = val; refreshView(); }
         
         function handleRarityClick(btn, rarity) {
           let activeVar = (currentCategory === 'equipment') ? currentRarity : selectedMaterialRarity;
           if (activeVar === rarity) {
             if (currentCategory === 'equipment') currentRarity = null; else selectedMaterialRarity = null;
             btn.classList.remove('active');
           } else {
             if (currentCategory === 'equipment') currentRarity = rarity; else selectedMaterialRarity = rarity;
             btn.parentNode.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
             btn.classList.add('active');
           }
           refreshView();
         }
         
         function handleTypeClick(btn, typeValue) {
           if (currentType === typeValue) { currentType = null; btn.classList.remove('active'); }
           else { currentType = typeValue; btn.parentNode.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
           refreshView();
         }
         
         function handleMaterialTopTypeClick(btn, typeValue) {
           if (currentType === typeValue) {
             currentType = null;
             btn.classList.remove('active');
           } else {
             currentType = typeValue;
             btn.parentNode.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
             btn.classList.add('active');
           }
           refreshView();
         }
         
         function handleColorClick(img, colorId) {
           let activeColor = (currentCategory === 'equipment') ? currentGiftColor : selectedMaterialColor;
           if (activeColor === colorId) {
             if (currentCategory === 'equipment') currentGiftColor = null; else selectedMaterialColor = null;
             img.classList.remove('active');
           } else {
             if (currentCategory === 'equipment') currentGiftColor = colorId; else selectedMaterialColor = colorId;
             img.parentNode.querySelectorAll('.gift-filter-icon').forEach(i => i.classList.remove('active'));
             img.classList.add('active');
           }
           refreshView();
         }
         
         /* ==========================================
            資料庫過濾與排序核心處理器
            ========================================== */
         function refreshView() {
           if (currentCategory === "equipment") {
             let list = [...equipmentData];
             list.sort((a, b) => {
               if (currentSort === "desc") return b.id - a.id;
               if (currentSort === "asc") return a.id - b.id;
               let typeMap = { hp: "HP", speed: "Speed", physical_attack: "Physical Attack", magic_attack: "Magic Attack", physical_defense: "Physical Defense", magic_defense: "Magic Defense" };
               let getVal = (item, sType) => (item.status?.find(s => s.type === typeMap[sType])?.value || 0);
               return getVal(b, currentSort) - getVal(a, currentSort);
             });
             if (currentRarity) list = list.filter(e => e.rarity === currentRarity);
             if (currentType) list = list.filter(e => e.slot_type === currentType);
             if (currentGiftColor) list = list.filter(e => recipeMasterData.find(r => r.target_id === e.id)?.gift_colors?.includes(currentGiftColor));
             if (currentSearch) list = list.filter(e => e.name.toLowerCase().includes(currentSearch));
             renderCategoryView('equipment', list);
         
           } else if (currentCategory === "battle_item") {
             let list = [...battleToolData];
             
             if (currentSort === "asc") {
               list.sort((a, b) => a.id - b.id);
             } else if (currentSort === "desc") {
               list.sort((a, b) => b.id - a.id);
             } else if (currentSort.startsWith("type_")) {
               const targetTypeNum = Number(currentSort.split("_")[1]);
               list.sort((a, b) => {
                 const weightA = Number(a.trait_filter_ids) === targetTypeNum ? 1 : 0;
                 const weightB = Number(b.trait_filter_ids) === targetTypeNum ? 1 : 0;
                 return weightB - weightA || b.id - a.id;
               });
             }
             
             if (selectedMaterialRarity) {
               const revMap = { "R": 1, "SR": 2, "SSR": 3 };
               list = list.filter(item => item.rarity === revMap[selectedMaterialRarity]);
             }
         
             if (currentType) {
               list = list.filter(item => Number(item.trait_filter_ids) === Number(currentType));
             }
         
             if (currentGiftColor) list = list.filter(e => recipeMasterData.find(r => r.target_id === e.id)?.gift_colors?.includes(currentGiftColor));
             if (currentSearch) list = list.filter(item => item.name.toLowerCase().includes(currentSearch));
             renderCategoryView('battle_item', list);
         
           } else if (currentCategory === "material") {
             let list = [...itemData];
             if (currentSearch) list = list.filter(item => item.name.toLowerCase().includes(currentSearch));
             if (selectedMaterialRarity) list = list.filter(item => item.rarity === selectedMaterialRarity);
             if (selectedMaterialColor) list = list.filter(item => item.trait_color_id === selectedMaterialColor);
         
             if (currentType === 'normal') {
               list = list.filter(item => !ATELIER_CANNON_IDS.includes(Number(item.id)));
             } else if (currentType === 'cannon') {
               list = list.filter(item => ATELIER_CANNON_IDS.includes(Number(item.id)));
             }
         
             let colorSortOptions = ["red", "blue", "green", "yellow", "purple"];
             if (colorSortOptions.includes(currentSort)) {
               let priorityMap = { blue: 1, purple: 2, yellow: 3, red: 4, green: 5 };
               let order = colorPriorityMap[priorityMap[currentSort]];
               list.sort((a, b) => order.indexOf(a.trait_color_id) - order.indexOf(b.trait_color_id) || b.id - a.id);
             } else {
               list.sort((a, b) => currentSort === "asc" ? a.id - b.id : b.id - a.id);
             }
             renderCategoryView('material', list);
           }
         }
         
         
         /* ==========================================
            特性篩選
            ========================================== */
         function showTraitUsage(traitId, type) {
         const k = getLangKey(currentLang);
         
         // 1. 取得資料
         const traitsObj = (type === 'battle') ? traitMasterData.battle_tool_traits : traitMasterData.equipment_tool_traits;
         const traitData = traitsObj?.[traitId];

         const traitDesc = traitData?.description?.[k] ?? "無詳細說明";
         
         // 2. 設定標題 (採用語系對應)
         const titleText = {
           'zh': `具備特性「${traitName}」的素材`,

           'en': `Materials with "${traitName}"`
         };
         document.getElementById("trait-modal-title").innerText = titleText[k] || titleText['zh'];
         
         // 3. 設定特性說明 (將標題與說明分開處理，避免格式衝突)

         const matchedItems = itemData.filter(item => {

           if (!traits) return false;
           return traits.some(t => (typeof t === "object" ? t.id : t) === traitId);
         });
         
         let htmlContent = `<div class="material-grid" style="grid-template-columns: repeat(, 1fr); gap: 10px; margin-top: 20px;">`;

         /* ==========================================
            🛠️ 資料庫非同步初始化
            ========================================== */
         async function init() {
         currentLang = localStorage.getItem('preferredLang') || 'zh';
         
         const langSelect = document.getElementById("language-select");
         if (langSelect) {
         langSelect.value = currentLang;
         
         langSelect.addEventListener("change", (e) => { 
            currentLang = e.target.value; 
            localStorage.setItem('preferredLang', currentLang); // 儲存切換後的語言
            switchControlPanel(currentCategory); 
            refreshView(); 
         });
         }
         
           const [recipeRes, itemsRes, traitRes, battleToolRes, equipRes] = await Promise.all([
             fetch("data/recipe_master.json"),
             fetch("data/item.json"),
             fetch("trait_master.json"), 
             fetch("data/battle_tool.json"),
             fetch("data/equipment.json")
           ]);
         
           recipeMasterData = await recipeRes.json();
           itemData = await itemsRes.json();
           traitMasterData = await traitRes.json();
           battleToolData = await battleToolRes.json();
           equipmentData = await equipRes.json();
         
         // 重新初始化索引
         itemUsageMap = {}; 
         
         recipeMasterData.forEach((recipe) => {
         if (recipe.materials && recipe.materials.length > 0) {
         recipe.materials.forEach((mat) => {
         // 這裡直接存入配方的 ID，最乾淨、最直接
         if (!itemUsageMap[mat.id]) { 
           itemUsageMap[mat.id] = []; 
         }
         
         // 確保不重複加入
         if (!itemUsageMap[mat.id].includes(recipe.recipe_id)) {
           itemUsageMap[mat.id].push(recipe.recipe_id);
         }
         });
         }
         });
         
         // 初始化頁面
         switchControlPanel(currentCategory);
         bindCategoryTabs();
         refreshView();
         }
         
         
         document.getElementById("usage-modal").addEventListener("click", e => {
           if (e.target.id === "usage-modal") { closeUsageModal(); }
         });
         
         document.getElementById("trait-modal").addEventListener("click", e => {
           if (e.target.id === "trait-modal") { closeTraitModal(); }
         });
         
         init();
      </script>
   </body>

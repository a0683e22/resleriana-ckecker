<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width,initial-scale=1" name="viewport" />
    <title>Items</title>
    <link href="images/favicon2.ico" rel="icon" />
    <style>
      body {
        background: #1f2430;
        color: #fff;
        font-family: sans-serif;
        margin: 20px;
        overflow-x: auto;
      }
      .control-panel {
        width: min(1280px, 100%);
        margin: 20px auto;
        padding: 16px 20px;
        background: #4b556f;
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      #search-input {
        width: 420px;
        height: 40px;
        padding: 0 14px;
        border: none;
        border-radius: 8px;
        background: #2f374a;
        color: #fff;
        font-size: 18px;
      }
      .filter-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .filter-btn {
        height: 36px;
        padding: 0 14px;
        border: none;
        border-radius: 8px;
        background: #69758f;
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s ease;
      }
      .filter-btn:hover {
        background: #8798be;
        transform: translateY(-1px);
      }
      .gift-filter-icon {
        width: 22px;
        height: 22px;
        cursor: pointer;
      }
      #language-select {
        margin-left: auto;
        height: 38px;
        padding: 0 10px;
        border: none;
        border-radius: 8px;
        background: #2f374a;
        color: #fff;
        font-size: 16px;
      }
      #main-list {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        min-width: 1280px;
      }
      .equip-card {
        width: min(1280px, 100%);
        display: flex;
        gap: 16px;
        background: #3e4658;
        border-radius: 12px;
        padding: 12px;
      }
      .equip-left {
        position: relative;
        width: 180px;
        height: 220px;
        flex-shrink: 0;
      }
      .equip-bg {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .equip-image {
        position: absolute;
        top: 46%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 120px;
        height: 120px;
        object-fit: contain;
      }
      .equip-slot-icon {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 34px;
        height: 34px;
      }
      .equip-name {
        position: absolute;
        bottom: 8px;
        width: 100%;
        text-align: center;
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 0 4px #000;
      }
      .equip-main {
        width: 860px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 14px;
      }
      .equip-status {
        display: flex;
        gap: 18px;
        font-size: 22px;
        color: #fff;
        font-weight: 700;
      }
      .equip-effect {
        font-size: 28px;
        line-height: 1.5;
        color: #dfe8ff;
      }
      .equip-materials {
        width: 200px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
      }
      .material-item {
        position: relative;
        width: 64px;
        height: 64px;
      }
      .material-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .material-count {
        position: absolute;
        bottom: -6px;
        right: 0;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 0 4px #000;
      }
      .material-item {
        position: relative;
        width: 72px;
        height: 72px;
      }
      .material-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .material-image {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 56px;
        height: 56px;
        object-fit: contain;
      }
      .event-reward {
        font-size: 20px;
        color: #ffd36b;
        font-weight: 700;
        text-align: right;
      }
      .gift-color-icon {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }
      .filter-btn.active {
        background: linear-gradient(180deg, #9db6ff, #7f96d9);
        color: #fff;
        box-shadow: 0 0 14px rgba(157, 182, 255, 0.55);
        transform: translateY(-2px);
        border: 1px solid rgba(255, 255, 255, 0.35);
      }
      .gift-filter-icon.active {
        transform: scale(1.15);
        filter: drop-shadow(0 0 6px #fff);
      }
      .shard-frame {
        position: absolute;
        width: 72px;
        height: 72px;
        object-fit: contain;
      }
      .shard-image {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 42px;
        height: 42px;
        object-fit: cover;
        border-radius: 50%;
      }
      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
      }
      .left-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .right-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-left: auto;
      }
      #equipment-controls,
      #material-controls {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .bottom-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      #equipment-bottom-controls,
      #material-bottom-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      #material-bottom-controls,
      #material-controls {
        display: none;
      }
      .equip-release {
        position: absolute;
        top: 6px;
        left: 6px;
        padding: 2px 6px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.6);
        font-size: 13px;
        color: #fff;
        font-weight: 700;
      }
      .copy-toast {
        position: fixed;
        left: 50%;
        bottom: 40px;
        transform: translateX(-50%) translateY(20px);
        background: rgba(20, 20, 30, 0.92);
        color: #fff;
        padding: 12px 20px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 300;
        pointer-events: none;
      }
      .copy-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .category-tabs {
        display: flex;
        gap: 10px;
      }
      .category-tab {
        height: 40px;
        padding: 0 18px;
        border: none;
        border-radius: 10px;
        background: #69758f;
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
      }
      .category-tab:hover {
        background: #8291b2;
      }
      .category-tab.active {
        background: #9db6ff;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.25);
      }
      .usage-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 400;
      }
      .usage-modal.show {
        display: flex;
      }
      .usage-modal-content {
        width: 520px;
        max-height: 70vh;
        overflow-y: auto;
        background: #3e4658;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
      }
      .usage-modal-title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 18px;
      }
      .usage-item {
        display: flex;
        align-items: center;
        flex-direction: column;
        gap: 14px;
        justify-content: center;
        padding: 10px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
      }
      .usage-item:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .usage-item img {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }
      .usage-item-name {
        font-size: 24px;
        font-weight: 700;
        line-height: 1.3;
        text-align: center;
      }
      .usage-close-btn {
        margin-top: 20px;
        width: 100%;
        height: 44px;
        border: none;
        border-radius: 10px;
        background: #7487b8;
        color: #fff;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
      }
      .equip-highlight {
        animation: equipFlash 1.8s ease;
      }
      @keyframes equipFlash {
        0% {
          box-shadow: 0 0 0 rgba(255, 255, 255, 0);
        }
        30% {
          box-shadow: 0 0 30px rgba(255, 255, 255, 0.9);
        }
        100% {
          box-shadow: 0 0 0 rgba(255, 255, 255, 0);
        }
      }
      .home-link {
        margin-left: auto;
        height: 38px;
        padding: 0 16px;
        border-radius: 8px;
        background: #2f374a;
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }
      .home-link:hover {
        background: #44506a;
      }
      .home-link {
        margin-left: auto;
        width: 52px;
        height: 52px;
        border-radius: 14px;
        background: 0 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }
      .home-link:hover {
        transform: scale(1.08);
      }
      .home-icon {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 14px;
      }
      .gift-color-group {
        width: 110px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .gift-color-group.empty {
        opacity: 0;
      }
      .patch-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 600;
      }
      .patch-modal.show {
        display: flex;
      }
      .patch-modal-content {
        width: 520px;
        background: #3e4658;
        border-radius: 18px;
        padding: 30px;
        text-align: Left;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
      }
      .patch-title {
        font-size: 34px;
        font-weight: 700;
        color: #9db6ff;
      }
      .patch-subtitle {
        margin-top: 8px;
        font-size: 24px;
        font-weight: 700;
      }
      .patch-body {
        margin-top: 24px;
        line-height: 1.8;
        font-size: 18px;
      }
      .patch-close-btn {
        margin-top: 28px;
        width: 100%;
        height: 46px;
        border: none;
        border-radius: 12px;
        background: #7487b8;
        color: #fff;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
      }
      .material-grid {
        width: min(1280px, 100%);
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
        gap: 12px;
        margin: 0 auto;
      }
      .material-card {
        display: flex;
        align-items: center;
        gap: 14px;
        background: #3e4658;
        border-radius: 12px;
        padding: 10px 14px;
        min-height: 96px;
      }
      .material-left {
        position: relative;
        width: 72px;
        height: 72px;
        flex-shrink: 0;
        cursor: pointer;
      }
      .material-rarity-bg {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .material-main-image {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 56px;
        height: 56px;
        object-fit: contain;
      }
      .material-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }
      .material-name {
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .material-traits {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .material-trait {
        font-size: 15px;
        color: #dfe8ff;
        cursor: pointer;
        transition: 0.15s;
      }
      .material-trait:hover {
        color: #fff;
        transform: translateX(2px);
      }
      .material-grid {
        width: min(1280px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
      }
      .material-card {
        display: flex;
        align-items: center;
        gap: 14px;
        background: #3e4658;
        border-radius: 12px;
        padding: 10px 14px;
        min-height: 84px;
      }
      .material-left {
        position: relative;
        width: 60px;
        height: 60px;
        flex-shrink: 0;
        cursor: pointer;
      }
      .material-rarity-bg {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .material-main-image {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 48px;
        height: 48px;
        object-fit: contain;
      }
      .material-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }
      .material-name {
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
      }
      .material-name:hover {
        opacity: 0.85;
      }
      .material-traits {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .material-trait {
        font-size: 15px;
        color: #c8d3ea;
        cursor: pointer;
      }
      .material-trait {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .material-trait.equipment {
        color: #c8dcff;
      }
      .material-trait.battle {
        color: #ffd39b;
      }
      .active {
        background: #6ea8ff;
        color: #fff;
      }
      .active-color {
        transform: scale(1.15);
        filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.5));
      }
      .material-name-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .material-color-icon {
        width: 24px;
        height: 24px;
        transform: translateY(2px);
      }
    </style>
  </head>
  <body>
    <div class="control-panel">
      <div class="top-row">
        <div class="left-controls">
          <div id="equipment-controls">
            <input id="search-input" placeholder="Search..." type="text" />
            <select id="filter-select">
              <option value="desc" data-i18n="new_old">New → Old</option>
              <option value="asc" data-i18n="old_new">Old → New</option>
              <option value="hp" data-i18n="hp">HP</option>
              <option value="speed" data-i18n="speed">Speed</option>
              <option value="physical_attack" data-i18n="physical_attack">P.ATK</option>
              <option value="magic_attack" data-i18n="magic_attack">M.ATK</option>
              <option value="physical_defense" data-i18n="physical_defense">P.DEF</option>
              <option value="magic_defense" data-i18n="magic_defense">M.DEF</option>
            </select>
          </div>
          <div id="material-controls">
            <button
              class="filter-btn" data-i18n="normal_material"
              onclick="
                if (materialMode === 'normal') {
                  materialMode = null;
                } else {
                  materialMode = 'normal';
                }
                loadMaterial();
              "
            >
              一般素材
            </button>
            <button
              class="filter-btn" data-i18n="canon_material"
              onclick="
                if (materialMode === 'canon') {
                  materialMode = null;
                } else {
                  materialMode = 'canon';
                }
                loadMaterial();
              "
            >
              工房砲素材
            </button>
            <select id="material-sort-select">
              <option value="desc" data-i18n="new_old">New → Old</option>
              <option value="asc" data-i18n="old_new">Old → New</option>
              <option value="red" data-i18n="red_first">Red First</option>
              <option value="blue" data-i18n="blue_first">Blue First</option>
              <option value="green" data-i18n="green_first">Green First</option>
              <option value="yellow" data-i18n="yellow_first">Yellow First</option>
              <option value="purple" data-i18n="purple_first">Purple First</option>
            </select>
          </div>
        </div>
        <div class="right-controls">
          <div class="category-tabs">
            <button class="category-tab active" data-category="equipment">
              <span data-i18n="equipment"> 裝備 </span>
            </button>
            <button class="category-tab" data-category="battle_item">
              <span data-i18n="battle_item"> 戰鬥道具 </span>
            </button>
            <button class="category-tab" data-category="material">
              <span data-i18n="material"> 素材 </span>
            </button>
          </div>
          <a class="home-link" href="index.html">
            <img
              alt="角色/回憶持有一覽"
              class="home-icon"
              src="images/ui/home.webp"
            />
          </a>
          <select id="language-select">
            <option value="zh">zh-TW</option>
            <option value="ja">JA</option>
            <option value="en">EN</option>
          </select>
        </div>
      </div>
      <div class="bottom-row">
        <div id="equipment-bottom-controls">
          <div class="filter-group">
            <button class="filter-btn" data-rarity="UR">UR</button>
            <button class="filter-btn" data-rarity="SSR">SSR</button>
            <button class="filter-btn" data-rarity="SR">SR</button>
            <button class="filter-btn" data-rarity="R">R</button>
          </div>
          <div class="filter-group">
            <button class="filter-btn" data-type="Weapon">
              <span data-i18n="weapon"> Weapon </span>
            </button>
            <button class="filter-btn" data-type="Armor">
              <span data-i18n="armor"> Armor </span>
            </button>
            <button class="filter-btn" data-type="Accessory">
              <span data-i18n="accessory"> Accessory </span>
            </button>
          </div>
          <div class="filter-group" data-type-group="">
            <img
              alt=""
              class="gift-filter-icon"
              data-color="1"
              src="images/ui/blue.png"
            />
            <img
              alt=""
              class="gift-filter-icon"
              data-color="3"
              src="images/ui/yellow.png"
            />
            <img
              alt=""
              class="gift-filter-icon"
              data-color="4"
              src="images/ui/red.png"
            />
            <img
              alt=""
              class="gift-filter-icon"
              data-color="5"
              src="images/ui/green.png"
            />
            <img
              alt=""
              class="gift-filter-icon"
              data-color="2"
              src="images/ui/purple.png"
            />
          </div>
        </div>
        <div id="material-bottom-controls">
          <div class="filter-group">
            <button
              class="filter-btn"
              data-rarity="SSR"
              onclick="
                if (selectedMaterialRarity === 'SSR') {
                  selectedMaterialRarity = null;
                } else {
                  selectedMaterialRarity = 'SSR';
                }
                loadMaterial();
              "
            >
              SSR
            </button>
            <button
              class="filter-btn"
              data-rarity="SR"
              onclick="
                if (selectedMaterialRarity === 'SR') {
                  selectedMaterialRarity = null;
                } else {
                  selectedMaterialRarity = 'SR';
                }
                loadMaterial();
              "
            >
              SR
            </button>
            <button
              class="filter-btn"
              data-rarity="R"
              onclick="
                if (selectedMaterialRarity === 'R') {
                  selectedMaterialRarity = null;
                } else {
                  selectedMaterialRarity = 'R';
                }
                loadMaterial();
              "
            >
              R
            </button>
          </div>
          <div class="filter-group">
            <img
              alt=""
              class="gift-filter-icon"
              data-color="1"
              onclick="
                if (selectedMaterialColor === 1) {
                  selectedMaterialColor = null;
                } else {
                  selectedMaterialColor = 1;
                }
                loadMaterial();
              "
              src="images/ui/blue.png"
            />
            <img
              alt=""
              class="gift-filter-icon"
              data-color="2"
              onclick="
                if (selectedMaterialColor === 2) {
                  selectedMaterialColor = null;
                } else {
                  selectedMaterialColor = 2;
                }
                loadMaterial();
              "
              src="images/ui/purple.png"
            />
            <img
              alt=""
              class="gift-filter-icon"
              data-color="3"
              onclick="
                if (selectedMaterialColor === 3) {
                  selectedMaterialColor = null;
                } else {
                  selectedMaterialColor = 3;
                }
                loadMaterial();
              "
              src="images/ui/yellow.png"
            />
            <img
              alt=""
              class="gift-filter-icon"
              data-color="4"
              onclick="
                if (selectedMaterialColor === 4) {
                  selectedMaterialColor = null;
                } else {
                  selectedMaterialColor = 4;
                }
                loadMaterial();
              "
              src="images/ui/red.png"
            />
            <img
              alt=""
              class="gift-filter-icon"
              data-color="5"
              onclick="
                if (selectedMaterialColor === 5) {
                  selectedMaterialColor = null;
                } else {
                  selectedMaterialColor = 5;
                }
                loadMaterial();
              "
              src="images/ui/green.png"
            />
          </div>
        </div>
      </div>
    </div>
    <div id="main-list"></div>
<div id="trait-modal" class="usage-modal" onclick="closeTraitModal()">
  <div class="usage-modal-content">
    <div id="trait-modal-title" class="usage-modal-title" ></div>
    <div id="trait-material-list"></div>
    <button class="usage-close-btn" onclick="closeTraitModal()">
      <span data-i18n="close">關閉</span>
    </button>
  </div>

      async function init() {
        let traitResponse = await fetch("trait_master.json");
        let traitData = await traitResponse.json();
        
        Object.entries(traitData.equipment_tool_traits).forEach(([key, val]) => {

        Object.entries(traitData.battle_tool_traits).forEach(([key, val]) => {
          battleTraitMap[key] = val;
        });

        let itemResponse = await fetch("data/item.json");
        let itemData = await itemResponse.json();

        let recipeData = await recipeResponse.json();

        let itemMap = {};
        itemData.forEach((item) => {

        async function loadEquipment() {
          let equipResponse = await fetch("data/equipment.json");
          let equipDataList = await equipResponse.json();
          equipmentData = equipDataList;
          
          let mainListEl = document.getElementById("main-list");
          
          equipDataList.sort((a, b) => {
            if (currentSort === "desc") {
              return b.id - a.id;
            }
            if (currentSort === "asc") {
              return a.id - b.id;
            }
            
            function getStatusValue(item, sortType) {
              let typeMap = {
                hp: "HP",
                speed: "Speed",
                physical_attack: "Physical Attack",
                magic_attack: "Magic Attack",
                physical_defense: "Physical Defense",
                magic_defense: "Magic Defense",
              };
              let mappedType = typeMap[sortType];
              let statusObj = item.status.find((s) => s.type === mappedType);
              return statusObj ? statusObj.value : 0;
            }
            
            return getStatusValue(b, currentSort) - getStatusValue(a, currentSort);
          });

          let filteredEquip = equipDataList;
          if (currentRarity) {
            filteredEquip = filteredEquip.filter((e) => e.rarity === currentRarity);
          }
          if (currentType) {
            filteredEquip = filteredEquip.filter((e) => e.slot_type === currentType);
          }
          if (currentGiftColor) {
            filteredEquip = filteredEquip.filter((e) => {
              let recipe = recipeMap[e.id];
              return recipe && recipe.gift_colors && recipe.gift_colors.includes(currentGiftColor);
            });
          }
          if (currentSearch) {
            filteredEquip = filteredEquip.filter((e) => e.name.toLowerCase().includes(currentSearch));
          }

          mainListEl.innerHTML = filteredEquip.map((equip) => {
            let recipe = recipeMap[equip.id];
            
            let slotIconSrc = "";
            switch (equip.slot_type) {
              case "Weapon":
                slotIconSrc = "images/ui/weapon.webp";
                break;
              case "Armor":
                slotIconSrc = "images/ui/armor.webp";
                break;
              case "Accessory":
                slotIconSrc = "images/ui/accessory.webp";
                break;
            }

            let giftColorsHtml = '<div class="gift-color-group empty"></div>';
            if (recipe && recipe.gift_colors) {
              let icons = recipe.gift_colors.map((color) => `
                <img src="${getGiftColorIcon(color)}" class="gift-color-icon">
              `).join("");
              giftColorsHtml = `<div class="gift-color-group">${icons}</div>`;
            }

            let statusHtml = equip.status.map((stat) => `
              <div>${getStatusText(stat.type)} +${stat.value}</div>
            `).join("");

            let materialsHtml = "";
            if (recipe) {
              materialsHtml = recipe.materials.map((mat) => {
                if (mat.type === 8) {
                  return `
                    <div class="material-item" data-material-id="${mat.id}">
                      <img src="images/ui/shard_frame.webp" class="shard-frame">
                      <img src="images/ingredient/${mat.id}.webp" class="shard-image">
                      <div class="material-count">x${mat.quantity}</div>
                    </div>
                  `;
                } else {
                  let matchedItem = itemMap[mat.id];
                  if (matchedItem) {
                    return `
                      <div class="material-item" data-material-id="${mat.id}">
                        <img src="${getRarityBg(matchedItem.rarity)}" class="material-bg">
                        <img src="${matchedItem.image?.trim()}" class="material-image">
                        <div class="material-count">x${mat.quantity}</div>
                      </div>
                    `;
                  }
                  return "";
                }
              }).join("");
            } else {
              let sourceKey = EQUIP_SOURCE[equip.id] || "event";
              materialsHtml = `<div class="event-reward">${t(sourceKey)}</div>`;
            }

            let abilityText = equip.ability === "None" ? t("no_ability") : equip.ability;

            return `
              <div class="equip-card" id="equip-${equip.id}">
                <div class="equip-left" onclick="copyText('${equip.name}')">
                  <img src="${getRarityBg(equip.rarity)}" class="equip-bg">
                  <img src="${equip.image?.trim()}" class="equip-image">
                  <img src="${slotIconSrc}" class="equip-slot-icon">
                  <div class="equip-release">${recipe ? recipe.start_at : ""}</div>
                  <div class="equip-name">${equip.name}</div>
                </div>
                <div class="equip-main">
                  <div class="equip-status">
                    ${giftColorsHtml}
                    ${statusHtml}
                  </div>
                  <div class="equip-effect">${abilityText}</div>
                </div>
                <div class="equip-materials">
                  ${materialsHtml}
                </div>
              </div>
            `;
          }).join("");

          document.querySelectorAll(".material-item").forEach((el) => {
            el.addEventListener("click", () => {
              showMaterialUsage(Number(el.dataset.materialId));
            });
          });
        }

        function refreshView() {
          if (currentCategory === "equipment") {
            loadEquipment();
          } else if (currentCategory === "material") {
            loadMaterial();
          }
        }

        recipeData.forEach((recipe) => {
          recipeMap[recipe.target_id] = recipe;
          recipe.materials.forEach((mat) => {
            if (!materialUsageMap[mat.id]) {
              materialUsageMap[mat.id] = [];
            }
            materialUsageMap[mat.id].push(recipe.target_id);
          });
        });

        document.querySelectorAll("[data-rarity]").forEach((btn) => {
          btn.addEventListener("click", () => {
            let rarity = btn.dataset.rarity;
            if (currentRarity === rarity) {
              currentRarity = null;
              btn.classList.remove("active");
            } else {
              currentRarity = rarity;
              document.querySelectorAll("[data-rarity]").forEach((b) => b.classList.remove("active"));
              btn.classList.add("active");
            }
            refreshView();
          });
        });

        document.querySelectorAll("[data-type]").forEach((btn) => {
          btn.addEventListener("click", () => {
            let type = btn.dataset.type;
            if (currentType === type) {
              currentType = null;
              btn.classList.remove("active");
            } else {
              currentType = type;
              document.querySelectorAll("[data-type]").forEach((b) => b.classList.remove("active"));
              btn.classList.add("active");
            }
            refreshView();
          });
        });

        document.querySelectorAll(".category-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            document.querySelectorAll(".category-tab").forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");
            currentCategory = tab.dataset.category;
            updateControlPanel();
            refreshView();
          });
        });

        document.querySelectorAll(".gift-filter-icon").forEach((icon) => {
          icon.addEventListener("click", () => {
            let colorId = Number(icon.dataset.color);
            if (currentGiftColor === colorId) {
              currentGiftColor = null;
            } else {
              currentGiftColor = colorId;
            }
            document.querySelectorAll(".gift-filter-icon").forEach((i) => i.classList.remove("active"));
            if (currentGiftColor) {
              icon.classList.add("active");
            }
            refreshView();
          });
        });

        document.getElementById("language-select").addEventListener("change", (e) => {
          currentLang = e.target.value;
          updateLanguageUI();
          refreshView();
        });

        document.getElementById("search-input").addEventListener("input", (e) => {
          currentSearch = e.target.value.toLowerCase();
          refreshView();
        });

        document.getElementById("filter-select").addEventListener("change", (e) => {
          currentSort = e.target.value;
          refreshView();
        });

        document.getElementById("material-sort-select").addEventListener("change", (e) => {
          currentSort = e.target.value;
          loadMaterial();
        });

        refreshView();
        updateLanguageUI();
      }

      function getGiftColorIcon(colorId) {
        switch (colorId) {
          case 1: return "images/ui/blue.png";
          case 2: return "images/ui/purple.png";
          case 3: return "images/ui/yellow.png";
          case 4: return "images/ui/red.png";
          case 5: return "images/ui/green.png";
          default: return "";
        }
      }

      function getRarityBg(rarity) {
        switch (rarity) {
          case 1:
          case "R":
            return "images/ui/r.webp";
          case 2:
          case "SR":
            return "images/ui/sr.webp";
          case 3:
          case "SSR":
            return "images/ui/ssr.webp";
          case 4:
          case "UR":
            return "images/ui/ur.webp";
          default:
            return "";
        }
      }

      function showMaterialUsage(materialId) {
console.log(materialId);
console.log(materialUsageMap[materialId]);
	document
.getElementById(
    "usage-modal"
)
.classList
.remove("show");
        let usages = materialUsageMap[materialId];
        if (usages && usages.length !== 0) {
          document.getElementById("usage-list").innerHTML = usages.map((id) => {
            let equip =
equipmentData.find(
    (e) => e.id == id
);
            if (equip) {
              return `
                <div class="usage-item" onclick="scrollToEquip(${equip.id})">
                  <img src="${equip.image?.trim()}">
                  <div class="usage-item-name">${equip.name}</div>
                </div>
              `;
            }
            return "";
          }).join("");
          requestAnimationFrame(() => {

    document
    .getElementById(
        "usage-modal"
    )
    .classList
    .add("show");

});
        } else {
          showToast("No Usage");
        }
      }

      function copyText(text) {
        navigator.clipboard.writeText(text);
        showToast(t("copied") + `「${text}」`);
      }

      function showToast(message) {
        let toast = document.createElement("div");
        toast.textContent = message;
        toast.className = "copy-toast";
        document.body.appendChild(toast);
        
        setTimeout(() => {
          toast.classList.add("show");
        }, 10);
        
        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => {
            toast.remove();
          }, 300);
        }, 1800);
      }

      function getStatusText(statusType) {
        let cleanType = statusType.toLowerCase().replaceAll(" ", "_");
        return t(cleanType);
      }

      function t(key) {
        return TEXTS[currentLang]?.[key] || key;
      }
function getTraitLang() {

  return currentLang === "ja"
    ? "jp"
    : currentLang;

}
      function updateLanguageUI() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          let key = el.dataset.i18n;
          el.textContent = t(key);
        });
      }

      function closeUsageModal() {
        document.getElementById("usage-modal").classList.remove("show");
      }

      function scrollToEquip(equipId) {
        closeUsageModal();
        let targetEl = document.getElementById("equip-" + equipId);
        if (targetEl) {
          targetEl.scrollIntoView({
            behavior: "smooth",
            block: "center",
          });
          targetEl.classList.add("equip-highlight");
          setTimeout(() => {
            targetEl.classList.remove("equip-highlight");
          }, 1800);
        }
      }

      function checkPatchNote() {
        if (localStorage.getItem("patchNoteVersion") !== PATCH_VERSION) {
          document.getElementById("patch-modal").classList.add("show");
        }
      }

      function closePatchModal() {
        localStorage.setItem("patchNoteVersion", PATCH_VERSION);
        document.getElementById("patch-modal").remove();
      }

      function updateControlPanel() {
        let equipCtrl = document.getElementById("equipment-controls");
        let matCtrl = document.getElementById("material-controls");
        let equipBottomCtrl = document.getElementById("equipment-bottom-controls");
        let matBottomCtrl = document.getElementById("material-bottom-controls");
        
        if (currentCategory === "material") {
          equipCtrl.style.display = "none";
          matCtrl.style.display = "flex";
          equipBottomCtrl.style.display = "none";
          matBottomCtrl.style.display = "flex";
        } else {
          equipCtrl.style.display = "flex";
          matCtrl.style.display = "none";
          equipBottomCtrl.style.display = "flex";
          matBottomCtrl.style.display = "none";
        }
      }

      async function loadMaterial() {
        let response = await fetch("data/item.json");
        let rawItems = await response.json();
        let filteredItems = rawItems;

        if (materialMode === "canon") {
          filteredItems = filteredItems.filter((item) => AtelierCanon.has(item.id));
        }
        if (materialMode === "normal") {
          filteredItems = filteredItems.filter((item) => !AtelierCanon.has(item.id));
        }
        if (selectedMaterialRarity) {
          filteredItems = filteredItems.filter((item) => item.rarity === selectedMaterialRarity);
        }
        if (selectedMaterialColor) {
          filteredItems = filteredItems.filter((item) => item.trait_color_id === selectedMaterialColor);
        }
        if (selectedTrait) {
          filteredItems = rawItems.filter((item) => {
            let combinedTraits = [...item.equipment_tool_trait_ids, ...item.battle_tool_trait_ids];
            let localizedTraits = combinedTraits.map((id) => equipmentTraitMap[id]?.[currentLang]);
            return localizedTraits.includes(selectedTrait);
          });
        }

        if (selectedPriority) {
          let priorities = colorPriorityMap[selectedPriority];
          filteredItems.sort((a, b) => priorities.indexOf(a.trait_color_id) - priorities.indexOf(b.trait_color_id));
        }

        let colorSortOptions = ["red", "blue", "green", "yellow", "purple"];
        if (colorSortOptions.includes(currentSort)) {
          let priorityMap = {
            blue: 1,
            purple: 2,
            yellow: 3,
            red: 4,
            green: 5,
          };
          let priorityOrder = colorPriorityMap[priorityMap[currentSort]];
          filteredItems.sort((a, b) => {
            let colorDiff = priorityOrder.indexOf(a.trait_color_id) - priorityOrder.indexOf(b.trait_color_id);
            if (colorDiff !== 0) {
              return colorDiff;
            }
            return b.id - a.id;
          });
        } else if (currentSort === "asc") {
          filteredItems.sort((a, b) => a.id - b.id);
        } else {
          filteredItems.sort((a, b) => b.id - a.id);
        }

        document.getElementById("main-list").innerHTML = `
          <div class="material-grid">
            ${filteredItems.map((item) => {
              try {
                return renderMaterialCard(item);
              } catch (err) {
                console.log(err);
                return "";
              }
            }).join("")}
          </div>
        `;
      }

      function renderMaterialCard(item) {
        let traits = [];
        if (item.equipment_tool_trait_ids) {
          item.equipment_tool_trait_ids.forEach((id) => {
            traits.push({
              type: "equipment",
              name: equipmentTraitMap[id]?.[getTraitLang()],
            });
          });
        }
        if (item.battle_tool_trait_ids) {
          item.battle_tool_trait_ids.forEach((id) => {
            traits.push({
              type: "battle",
              name: battleTraitMap[id]?.[getTraitLang()],
            });
          });
        }
        traits = traits.filter((t) => t.name);

        return `
          <div class="material-card">
            <div class="material-left" onclick="showMaterialUsage(${item.id})">
              <img src="${getRarityBg(item.rarity)}" class="material-rarity-bg">
              <img src="${item.image?.trim()}" class="material-main-image">
            </div>
            <div class="material-content">
              <div class="material-name" onclick="copyText('${item.name}')">
                <img src="${getGiftColorIcon(item.trait_color_id)}" class="material-color-icon">
                ${item.name}
              </div>
              <div class="material-traits">
                ${traits.slice(0, 2).map((trait) => `
                  <div class="material-trait ${trait.type}" onclick="showTraitMaterials('${trait.name}')">
                    ・${trait.name}
                  </div>
                `).join("")}
              </div>
            </div>
          </div>
        `;
      }

      function filterTrait(traitName) {
        selectedTrait = traitName;
        refreshCurrentCategory();
      }

      function updateMaterialFilterButtons() {
        document.querySelectorAll("#material-bottom-controls [data-rarity]").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.rarity === selectedMaterialRarity);
        });
        document.querySelectorAll("#material-bottom-controls [data-color]").forEach((btn) => {
          let colorNum = Number(btn.dataset.color);
          btn.classList.toggle("active-color", colorNum === selectedMaterialColor);
        });
      }

      async function showTraitMaterials(traitName) {
        let response = await fetch("data/item.json");
        let rawItems = await response.json();
        
        let matchedItems = rawItems.filter((item) => {
          let equipTraits = (item.equipment_tool_trait_ids || []).map((id) => equipmentTraitMap[id]?.[getTraitLang()]);
          let battleTraits = (item.battle_tool_trait_ids || []).map((id) => battleTraitMap[id]?.[getTraitLang()]);
          return [...equipTraits, ...battleTraits].includes(traitName);
        });
        
        showMaterialTraitModal(traitName, matchedItems);
      }

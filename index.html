<!DOCTYPE html>
<html lang="zh-Hant">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>角色持有清單</title>
      <link rel="icon" href="favicon.ico">
      <style>
         :root {
         --bg-body: #020617;
         --bg-card: #0f172a;
         --bg-panel: #111827;
         --text-main: #f8fafc;
         --text-sub: #94a3b8;
         --border: #1e293b;
         --primary: #3b82f6;
         --danger: #ef4444;
         }
         body.light {
         --bg-body: #f3f4f6;
         --bg-card: #ffffff;
         --bg-panel: #f9fafb;
         --text-main: #111827;
         --text-sub: #6b7280;
         --border: #e5e7eb;
         }
         body {
         font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
         background-color: var(--bg-body);
         color: var(--text-main);
         margin: 0;
         padding: 20px;
         display: flex;
         justify-content: center;
         }
         body[data-view="list"] .container {
         max-width: 640px;
         }
         body[data-view="table"] .container {
         max-width: 1280px;
         }
         .container {
         width: 100%;
         max-width: 550px;
         background: var(--bg-card);
         border-radius: 16px;
         box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
         overflow: hidden;
         margin-bottom: 40px;
         }
         header {
         padding: 20px;
         background: var(--bg-card);
         border-bottom: 2px solid var(--border);
         text-align: center;
         position: sticky;
         top: 0;
         z-index: 10;
         }
         h1 { margin: 0 0 14px; }
         .control-panel {
         padding: 15px;
         background: var(--bg-panel);
         border-bottom: 1px solid var(--border);
         display: flex;
         flex-direction: column;
         gap: 10px;
         }
         .button-group { display: flex; gap: 10px; }
         button {
         flex: 1;
         padding: 10px;
         border: none;
         border-radius: 8px;
         font-weight: 600;
         cursor: pointer;
         transition: opacity 0.2s, background-color 0.2s, border-color 0.2s;
         }
         button:hover { opacity: 0.88; }
         .btn-copy { background-color: #10b981; color: white; }
         .btn-reset { background-color: var(--danger); color: white; }
         #result-url {
         width: 100%;
         box-sizing: border-box;
         padding: 8px;
         border: 1px solid var(--border);
         border-radius: 4px;
         font-size: 0.8rem;
         background: var(--bg-panel);
         color: var(--text-main);
         word-break: break-all;
         min-height: 20px;
         text-align: left;
         }
         .filter-title {
         font-size: 0.82rem;
         color: var(--text-sub);
         text-align: left;
         margin-top: 2px;
         margin-bottom: -4px;
         font-weight: 700;
         }
         .filter-panel {
         display: flex;
         flex-wrap: wrap;
         gap: 8px;
         padding-top: 4px;
         align-items: center;
         }
         .filter-btn {
         flex: 0 0 auto;
         padding: 7px 11px;
         border: 1px solid var(--border);
         border-radius: 999px;
         background: var(--bg-panel);
         color: var(--text-main);
         font-size: 0.88rem;
         }
         .filter-btn.active {
         background: var(--primary);
         color: #ffffff;
         border-color: var(--primary);
         }
         .role-filter-panel {
         gap: 10px;
         }
         .role-filter-btn {
         flex: 0 0 auto;
         width: 42px;
         height: 42px;
         padding: 4px;
         border-radius: 999px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         opacity: 0.65;
         }
         .role-filter-btn img {
         width: 100%;
         height: 100%;
         object-fit: contain;
         display: block;
         }
         .role-filter-btn.active {
         opacity: 1;
         background: rgba(59, 130, 246, 0.22);
         border-color: var(--primary);
         box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18);
         }
         .item.hidden-by-filter { display: none; }
         .list-wrapper { max-height: 70vh; overflow-y: auto; }
         .item {
         display: flex;
         align-items: center;
         padding: 14px 20px;
         border-bottom: 1px solid var(--border);
         }
         .checkbox-wrapper { margin-right: 18px; display: flex; align-items: center; }
         input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; }
         input[type="checkbox"]:disabled { cursor: not-allowed; }
         .info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
         .main-line { display: flex; align-items: center; font-size: 1.05rem; font-weight: 600; cursor: pointer; line-height: 1.35; }
         .fixed .main-line { cursor: default; }
         .fixed {
         background: var(--bg-card);
         }
         .attr-tag {
         padding: 2px 10px;
         border-radius: 6px;
         font-size: 0.8rem;
         font-weight: bold;
         margin-right: 8px;
         min-width: 35px;
         text-align: center;
         color: #ffffff;
         flex-shrink: 0;
         }
         .role-icon {
         width: 28px;
         height: 28px;
         object-fit: contain;
         margin-right: 8px;
         flex-shrink: 0;
         }
         .date-line { font-size: 0.85rem; color: var(--text-sub); padding-left: 55px; }
         .loading, .error { padding: 20px; color: var(--text-sub); text-align: center; }
         .error { color: var(--danger); }
         .tag-火 { background-color: #b91c1c; }
         .tag-冰 { background-color: #0ea5e9; }
         .tag-雷 { background-color: #eab308; color: #000000; }
         .tag-風 { background-color: #15803d; }
         .tag-斬 { background-color: #4b5563; }
         .tag-打 { background-color: #78350f; }
         .tag-突 { background-color: #4338ca; }
         .title-row {
         position: relative;
         display: flex;
         justify-content: center;
         align-items: center;
         margin: 0 0 14px;
         }
         .title-row h1 {
         margin: 0;
         color: var(--text-main);
         padding-right: 120px;
         }
         .theme-toggle {
         position: static;
         transform: none;
         width: 36px;
         height: 36px;
         padding: 0;
         border-radius: 999px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         color: var(--text-main);
         font-size: 18px;
         line-height: 1;
         cursor: pointer;
         flex: 0 0 auto;
         display: flex;
         align-items: center;
         justify-content: center;
         }
         @media (max-width: 480px) {
         body { padding: 12px; }
         header { padding: 16px; }
         .item { padding: 13px 14px; }
         .checkbox-wrapper { margin-right: 14px; }
         .role-filter-btn { width: 40px; height: 40px; }
         }
         .clear-btn {
         width: 42px;
         height: 42px;
         padding: 4px;
         border-radius: 999px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         display: flex;
         align-items: center;
         justify-content: center;
         font-size: 18px;
         color: #ef4444;
         opacity: 1;
         }
         .clear-btn:hover {
         background: #fee2e2;
         border-color: #ef4444;
         }
         .clear-btn.active {
         background: #ffffff !important;
         border-color: var(--border) !important;
         box-shadow: none !important;
         opacity: 1;
         }
         .push-right {
         margin-left: auto;
         }
         .attr-btn {
         flex: 0 0 auto;
         width: 42px;
         height: 42px;
         padding: 4px;
         border-radius: 999px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         opacity: 0.70;
         }
         .attr-btn img {
         width: 100%;
         height: 100%;
         object-fit: contain;
         display: block;
         }
         .attr-btn.active {
         opacity: 1;
         background: rgba(59, 130, 246, 0.22);
         border-color: var(--primary);
         box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18);
         }
         .title-actions {
         position: absolute;
         right: 0;
         top: 50%;
         transform: translateY(-50%);
         display: flex;
         gap: 8px;
         align-items: center;
         }
         .view-toggle {
         display: flex;
         gap: 8px;
         }
         .view-btn {
         flex: 1;
         padding: 8px 10px;
         border-radius: 8px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         color: var(--text-main);
         }
         .view-btn.active {
         background: var(--primary);
         color: #ffffff;
         border-color: var(--primary);
         }
         .table-view {
         overflow-x: auto;
         border-top: 1px solid var(--border);
         }
         .matrix-table {
         min-width: 1180px;
         display: grid;
         grid-template-columns: 90px repeat(4, minmax(260px, 1fr));
         border-left: 1px solid var(--border);
         border-top: 1px solid var(--border);
         }
         .matrix-cell {
         border-right: 1px solid var(--border);
         border-bottom: 1px solid var(--border);
         background: var(--bg-card);
         min-height: 80px;
         }
         .matrix-head {
         position: sticky;
         top: 0;
         z-index: 2;
         min-height: auto;
         padding: 10px 8px;
         background: var(--bg-panel);
         font-size: 0.85rem;
         font-weight: 700;
         text-align: center;
         display: flex;
         align-items: center;
         justify-content: center;
         gap: 6px;
         }
         .matrix-head img {
         width: 24px;
         height: 24px;
         object-fit: contain;
         }
         .matrix-attr {
         position: sticky;
         left: 0;
         z-index: 1;
         background: var(--bg-panel);
         display: flex;
         align-items: center;
         justify-content: center;
         gap: 6px;
         font-size: 0.85rem;
         font-weight: 700;
         }
         .matrix-attr img {
         width: 28px;
         height: 28px;
         object-fit: contain;
         }
         .matrix-slot {
         padding: 6px;
         display: flex;
         flex-direction: column;
         gap: 6px;
         }
         .table-card {
         display: flex;
         align-items: flex-start;
         gap: 10px;
         padding: 10px;
         border: 1px solid var(--border);
         border-radius: 8px;
         background: var(--bg-panel);
         min-height: 82px;
         }
         .table-card .checkbox-wrapper {
         margin-right: 0;
         padding-top: 2px;
         }
         .table-card input[type="checkbox"] {
         width: 18px;
         height: 18px;
         }
         .table-info {
         min-width: 0;
         flex: 1;
         }
         .table-name {
         display: flex;
         align-items: center;
         gap: 4px;
         font-size: 0.8rem;
         font-weight: 600;
         line-height: 1.35;
         word-break: break-word;
         cursor: pointer;
         }
         .table-name .role-icon {
         width: 20px;
         height: 20px;
         margin-right: 0;
         }
         .table-date {
         margin-top: 3px;
         font-size: 0.7rem;
         color: var(--text-sub);
         }
         .matrix-empty {
         color: var(--text-sub);
         font-size: 0.75rem;
         padding: 8px;
         opacity: 0.6;
         }
         @media (max-width: 700px) {
         .matrix-table {
         min-width: 1180px;
         grid-template-columns: 90px repeat(4, minmax(260px, 1fr));
         }
         }
         .lang-select {
         height: 36px;
         border-radius: 999px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         color: var(--text-main);
         padding: 0 10px;
         font-size: 0.85rem;
         font-weight: 600;
         cursor: pointer;
         }
      </style>
   </head>
   <body>
      <div class="container">
         <header>
            <div class="title-row">
               <h1 id="page-title">角色持有清單</h1>
               <div class="title-actions">
                  <select id="lang-select" class="lang-select">
                     <option value="zh">繁體中文</option>
                     <option value="ja">日本語</option>
                     <option value="en">English</option>
                  </select>
                  <button id="theme-toggle"
                     class="theme-toggle"
                     type="button"
                     onclick="toggleTheme()"
                     title="切換深淺模式"
                     aria-label="切換深淺模式">
                  💡
                  </button>
               </div>
            </div>
            <div class="control-panel">
               <div id="result-url">讀取中...</div>
               <div class="button-group">
                  <button id="copy-btn" class="btn-copy" onclick="copyUrl()">複製網址</button>
                  <button id="reset-btn" class="btn-reset" onclick="resetTable()">Reset 表格</button>
               </div>
               <div class="view-toggle" aria-label="顯示模式">
                  <button id="view-list-btn" class="view-btn active" type="button" data-view-mode="list">列表顯示</button>
                  <button id="view-table-btn" class="view-btn" type="button" data-view-mode="table">表格顯示</button>
               </div>
               <div class="filter-title">屬性篩選</div>
               <div class="filter-panel" aria-label="屬性篩選">
                  <button type="button" class="filter-btn attr-btn" data-attr-filter="火" title="火" aria-label="火">
                  <img src="images/attr/f.1dbf47.png" alt="火">
                  </button>
                  <button type="button" class="filter-btn attr-btn" data-attr-filter="冰" title="冰" aria-label="冰">
                  <img src="images/attr/i.b647e3.png" alt="冰">
                  </button>
                  <button type="button" class="filter-btn attr-btn" data-attr-filter="雷" title="雷" aria-label="雷">
                  <img src="images/attr/l.119818.png" alt="雷">
                  </button>
                  <button type="button" class="filter-btn attr-btn" data-attr-filter="風" title="風" aria-label="風">
                  <img src="images/attr/w.d06628.png" alt="風">
                  </button>
                  <button type="button" class="filter-btn attr-btn" data-attr-filter="斬" title="斬" aria-label="斬">
                  <img src="images/attr/s.42817b.png" alt="斬">
                  </button>
                  <button type="button" class="filter-btn attr-btn" data-attr-filter="打" title="打" aria-label="打">
                  <img src="images/attr/k.3148cc.png" alt="打">
                  </button>
                  <button type="button" class="filter-btn attr-btn" data-attr-filter="突" title="突" aria-label="突">
                  <img src="images/attr/t.ac73b3.png" alt="突">
                  </button>
               </div>
               <div class="filter-title">職種篩選</div>
               <div class="filter-panel role-filter-panel" aria-label="職種篩選">
                  <button type="button" class="role-filter-btn" data-role-filter="攻擊者" title="攻擊者" aria-label="攻擊者">
                  <img src="images/role/a.52ca9a.png" alt="攻擊者">
                  </button>
                  <button type="button" class="role-filter-btn" data-role-filter="破防者" title="破防者" aria-label="破防者">
                  <img src="images/role/b.2e7b02.png" alt="破防者">
                  </button>
                  <button type="button" class="role-filter-btn" data-role-filter="防禦者" title="防禦者" aria-label="防禦者">
                  <img src="images/role/d.ab8d93.png" alt="防禦者">
                  </button>
                  <button type="button" class="role-filter-btn" data-role-filter="支援者" title="支援者" aria-label="支援者">
                  <img src="images/role/s.0c211b.png" alt="支援者">
                  </button>
                  <button 
                     type="button" 
                     class="role-filter-btn clear-btn push-right"
                     onclick="clearAllFilters()"
                     title="清除所有篩選"
                     aria-label="清除所有篩選"
                     >
                  ❌
                  </button>
               </div>
            </div>
         </header>
         <div class="list-wrapper">
            <div id="dynamic-list">
               <div class="loading">角色資料讀取中...</div>
            </div>
         </div>
      </div>
      <script>
         const STORAGE_KEY = 'resleri_character_checked_ids_v1';
         const ATTR_FILTER_STORAGE_KEY = 'resleri_character_attr_filters_v1';
         const ROLE_FILTER_STORAGE_KEY = 'resleri_character_role_filters_v1';
         const DATA_FILE = 'characters.json';
         const BASE_CHARS = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ~_';
         const FIXED_CHARACTER_IDS = new Set(['0', '23']);
         
         const ROLE_ALIASES = {
             1: '攻擊者', '1': '攻擊者', 'Attacker': '攻擊者', 'attacker': '攻擊者', '攻擊者': '攻擊者',
             2: '破防者', '2': '破防者', 'Breaker': '破防者', 'breaker': '破防者', '破防者': '破防者', '破壞者': '破防者',
             3: '防禦者', '3': '防禦者', 'Defender': '防禦者', 'defender': '防禦者', '防禦者': '防禦者',
             4: '支援者', '4': '支援者', 'Supporter': '支援者', 'supporter': '支援者', 'Supportor': '支援者', 'supportor': '支援者', '支援者': '支援者'
         };
         const ROLE_ICON_MAP = {
             '攻擊者': 'images/role/a.52ca9a.png',
             '破防者': 'images/role/b.2e7b02.png',
             '防禦者': 'images/role/d.ab8d93.png',
             '支援者': 'images/role/s.0c211b.png'
         };
         
         const UI_TEXT = {
             zh: {
                 title: '角色持有清單',
                 copy: '複製網址',
                 reset: 'Reset 表格',
                 viewList: '列表顯示',
                 viewTable: '表格顯示'
             },
             ja: {
                 title: '所持キャラ一覧',
                 copy: 'URLをコピー',
                 reset: '表をリセット',
                 viewList: 'リスト表示',
                 viewTable: '表形式'
             },
             en: {
                 title: 'Character Checklist',
                 copy: 'Copy URL',
                 reset: 'Reset Table',
                 viewList: 'List View',
                 viewTable: 'Table View'
             }
         };
         
         let allCharacters = [];
         let activeAttrFilters = new Set();
         let activeRoleFilters = new Set();
         let currentTheme = localStorage.getItem('theme') || 'dark';
         let currentLang = localStorage.getItem('lang') || 'zh';
         let currentView = localStorage.getItem('viewMode') || 'list';
         
         function applyTheme() {
             document.body.classList.toggle('light', currentTheme === 'light');
             const btn = document.getElementById('theme-toggle');
             if (btn) btn.textContent = currentTheme === 'dark' ? '💡' : '☪';
         }
         
         function toggleTheme() {
             currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
             localStorage.setItem('theme', currentTheme);
             applyTheme();
         }
         
         function setupLanguageSelect() {
             const langSelect = document.getElementById('lang-select');
             if (!langSelect) return;
             langSelect.value = currentLang;
             langSelect.addEventListener('change', () => {
                 currentLang = langSelect.value;
                 localStorage.setItem('lang', currentLang);
                 applyUiLanguage();
                 rerenderCharactersKeepChecked();
             });
         }
         
         function applyUiLanguage() {
             const text = UI_TEXT[currentLang] || UI_TEXT.zh;
             const title = document.getElementById('page-title');
             const copyBtn = document.getElementById('copy-btn');
             const resetBtn = document.getElementById('reset-btn');
             const viewListBtn = document.getElementById('view-list-btn');
             const viewTableBtn = document.getElementById('view-table-btn');
             if (title) title.textContent = text.title;
             if (copyBtn) copyBtn.textContent = text.copy;
             if (resetBtn) resetBtn.textContent = text.reset;
             if (viewListBtn) viewListBtn.textContent = text.viewList;
             if (viewTableBtn) viewTableBtn.textContent = text.viewTable;
         }
         
         function bindCheckboxEvents() {
             getNormalCheckboxes().forEach(cb => {
                 cb.addEventListener('change', () => syncShareUrl());
             });
         }
         
         function rerenderCharactersKeepChecked() {
             const checkedIds = getCheckedIds();
             renderCharacters(allCharacters);
             setCheckedIds(checkedIds);
             bindCheckboxEvents();
             applyFilters();
             syncShareUrl();
         }
         
         
         function setupViewButtons() {
             document.querySelectorAll('[data-view-mode]').forEach(btn => {
                 btn.addEventListener('click', () => {
                     const mode = btn.dataset.viewMode;
                     if (!mode || mode === currentView) return;
                     const checkedIds = getCheckedIds();
                     currentView = mode;
                     document.body.setAttribute("data-view", currentView);
                     localStorage.setItem('viewMode', currentView);
                     renderCharacters(allCharacters);
                     setCheckedIds(checkedIds);
                     bindCheckboxEvents();
                     setupTableSelectAll();
                     applyFilters();
                     syncShareUrl();
                     updateViewButtons();
                 });
             });
             updateViewButtons();
         }
         
         function updateViewButtons() {
             document.querySelectorAll('[data-view-mode]').forEach(btn => {
                 btn.classList.toggle('active', btn.dataset.viewMode === currentView);
             });
         }
         function setupTableSelectAll() {
         
         // 🔹 全表全選
         const selectAll = document.getElementById('select-all');
         if (selectAll) {
         selectAll.onchange = () => {
         document.querySelectorAll('.table-card input[type="checkbox"]:not(:disabled)')
         .forEach(cb => {
          cb.checked = selectAll.checked;
          cb.dispatchEvent(new Event('change'));
         });
         };
         }
         
         // 🔹 職種全選（欄）
         document.querySelectorAll('[data-col]').forEach(cb => {
         cb.onchange = () => {
         const role = cb.dataset.col;
         document.querySelectorAll(`.table-card[data-role="${role}"] input[type="checkbox"]:not(:disabled)`)
         .forEach(box => {
          box.checked = cb.checked;
          box.dispatchEvent(new Event('change'));
         });
         };
         });
         
         // 🔹 屬性全選（列）
         document.querySelectorAll('[data-row]').forEach(cb => {
         cb.onchange = () => {
         const attr = cb.dataset.row;
         document.querySelectorAll(`.table-card[data-attr="${attr}"] input[type="checkbox"]:not(:disabled)`)
         .forEach(box => {
          box.checked = cb.checked;
          box.dispatchEvent(new Event('change'));
         });
         };
         });
         }
         
         function escapeHtml(value) {
             return String(value ?? '')
                 .replace(/&/g, '&amp;')
                 .replace(/</g, '&lt;')
                 .replace(/>/g, '&gt;')
                 .replace(/"/g, '&quot;')
                 .replace(/'/g, '&#039;');
         }
         
         function getShareUrl() {
         const selectedIds = getCheckedIds();
         const baseUrl = window.location.href.split('?')[0];
         if (selectedIds.length === 0) return baseUrl;
         const key = encodeIdsToKey(selectedIds);
         return `${baseUrl}?k=${encodeURIComponent(key)}`;
         }
         
         function syncShareUrl() {
         const finalUrl = getShareUrl();
         document.getElementById('result-url').innerText = finalUrl;
         
         // 只更新畫面上的分享網址，不再改瀏覽器真實網址。
         saveToLocalStorage();
         return finalUrl;
         }
         
         function normalizeAttr(attr) {
             return String(attr ?? '');
         }
         
         function normalizeRole(role) {
             const value = String(role ?? '');
             return ROLE_ALIASES[value] || value;
         }
         
         function getCharacterId(char) {
             return Number(char.id ?? char['角色ID'] ?? char.character_id ?? char.chara_id);
         }
         
         function isFixedCharacterId(id) {
             return FIXED_CHARACTER_IDS.has(String(id));
         }
         
         function getCheckboxAttrs(id) {
             return isFixedCharacterId(id) ? ' checked disabled' : '';
         }
         
         function getCharacterName(char) {
             if (char.name && typeof char.name === 'object') {
                 return char.name[currentLang]
                     || char.name.zh
                     || char.name.ja
                     || char.name.en
                     || '';
             }
             return char.name ?? char['角色名稱'] ?? char.fullname ?? '';
         }
         
         function getCharacterAttr(char) {
             return char.attr ?? char['真屬性'] ?? '';
         }
         
         function getCharacterRole(char) {
             return normalizeRole(char['職種'] ?? char.role_name ?? char.role ?? '');
         }
         
         function getDateText(char) {
             if (char.note) return char.note;
             const date = char.date ?? char['開放時間'] ?? char.start_at ?? '';
             if (!date) return '';
             const shortDate = String(date).split('T')[0];
             return `開放日期：${shortDate}`;
         }
         
         function saveFilterState() {
             localStorage.setItem(ATTR_FILTER_STORAGE_KEY, JSON.stringify(Array.from(activeAttrFilters)));
             localStorage.setItem(ROLE_FILTER_STORAGE_KEY, JSON.stringify(Array.from(activeRoleFilters)));
         }
         
         function loadFilterState() {
             try {
                 const savedAttrs = JSON.parse(localStorage.getItem(ATTR_FILTER_STORAGE_KEY) || '[]');
                 if (Array.isArray(savedAttrs)) activeAttrFilters = new Set(savedAttrs.map(normalizeAttr).filter(Boolean));
             } catch (error) {
                 activeAttrFilters = new Set();
             }
             try {
                 const savedRoles = JSON.parse(localStorage.getItem(ROLE_FILTER_STORAGE_KEY) || '[]');
                 if (Array.isArray(savedRoles)) activeRoleFilters = new Set(savedRoles.map(normalizeRole).filter(Boolean));
             } catch (error) {
                 activeRoleFilters = new Set();
             }
         }
         
         function updateFilterButtons() {
             document.querySelectorAll('[data-attr-filter]').forEach(btn => {
                 const filter = btn.dataset.attrFilter;
                 btn.classList.toggle('active', activeAttrFilters.has(normalizeAttr(filter)));
             });
             document.querySelectorAll('[data-role-filter]').forEach(btn => {
                 btn.classList.toggle('active', activeRoleFilters.has(normalizeRole(btn.dataset.roleFilter)));
             });
         }
         
         function applyFilters() {
             document.querySelectorAll('.item[data-attr]').forEach(item => {
                 const attr = normalizeAttr(item.dataset.attr);
                 const role = normalizeRole(item.dataset.role);
                 const matchAttr = activeAttrFilters.size === 0 || activeAttrFilters.has(attr);
                 const matchRole = activeRoleFilters.size === 0 || activeRoleFilters.has(role);
                 item.classList.toggle('hidden-by-filter', !(matchAttr && matchRole));
             });
             updateFilterButtons();
         }
         
         function setupFilterButtons() {
             document.querySelectorAll('[data-attr-filter]').forEach(btn => {
                 btn.addEventListener('click', () => {
                     const filter = btn.dataset.attrFilter;
                     const attr = normalizeAttr(filter);
                     if (activeAttrFilters.has(attr)) activeAttrFilters.delete(attr);
                     else activeAttrFilters.add(attr);
                     saveFilterState();
                     applyFilters();
                 });
             });
         
             document.querySelectorAll('[data-role-filter]').forEach(btn => {
                 btn.addEventListener('click', () => {
                     const role = normalizeRole(btn.dataset.roleFilter);
                     if (activeRoleFilters.has(role)) activeRoleFilters.delete(role);
                     else activeRoleFilters.add(role);
                     saveFilterState();
                     applyFilters();
                 });
             });
         }
         
         function renderCharacters(characters) {
             if (currentView === 'table') {
                 renderCharactersTable(characters);
             } else {
                 renderCharactersList(characters);
             }
             updateViewButtons();
         }
         
         function renderCharactersList(characters) {
             const list = document.getElementById('dynamic-list');
             list.innerHTML = characters.map(char => {
                 const id = getCharacterId(char);
                 if (!Number.isFinite(id)) return '';
                 const attr = getCharacterAttr(char);
                 const role = getCharacterRole(char);
                 const roleIcon = ROLE_ICON_MAP[role] || '';
                 const dateText = getDateText(char);
                 const name = getCharacterName(char);
                 return `
                     <div class="item${isFixedCharacterId(id) ? ' fixed' : ''}" data-attr="${escapeHtml(attr)}" data-role="${escapeHtml(role)}">
                         <div class="checkbox-wrapper">
                             <input type="checkbox" id="c${id}" class="char-cb${isFixedCharacterId(id) ? ' fixed-cb' : ''}"${getCheckboxAttrs(id)}>
                         </div>
                         <div class="info">
                             <label for="c${id}" class="main-line">
                                 <span class="attr-tag tag-${escapeHtml(attr)}">${escapeHtml(attr)}</span>
                                 ${roleIcon ? `<img class="role-icon" src="${roleIcon}" alt="${escapeHtml(role)}" title="${escapeHtml(role)}">` : ''}
                                 ${escapeHtml(name)}
                             </label>
                             <span class="date-line">${escapeHtml(dateText)}</span>
                         </div>
                     </div>
                 `;
             }).join('');
         }
         
         function renderCharactersTable(characters) {
             const list = document.getElementById('dynamic-list');
             const attrOrder = ['火', '冰', '雷', '風', '斬', '打', '突'];
             const roleOrder = ['攻擊者', '破防者', '防禦者', '支援者'];
             const attrIconMap = {
                 '火': 'images/attr/f.1dbf47.png',
                 '冰': 'images/attr/i.b647e3.png',
                 '雷': 'images/attr/l.119818.png',
                 '風': 'images/attr/w.d06628.png',
                 '斬': 'images/attr/s.42817b.png',
                 '打': 'images/attr/k.3148cc.png',
                 '突': 'images/attr/t.ac73b3.png'
             };
         
             const groups = new Map();
             attrOrder.forEach(attr => {
                 roleOrder.forEach(role => {
                     groups.set(`${attr}|${role}`, []);
                 });
             });
         
             characters.forEach(char => {
                 const attr = getCharacterAttr(char);
                 const role = getCharacterRole(char);
                 const key = `${attr}|${role}`;
                 if (!groups.has(key)) groups.set(key, []);
                 groups.get(key).push(char);
             });
         
             const renderCard = (char, attr) => {
                 const id = getCharacterId(char);
                 if (!Number.isFinite(id)) return '';
                 const role = getCharacterRole(char);
                 const roleIcon = ROLE_ICON_MAP[role] || '';
                 const dateText = getDateText(char);
                 const name = getCharacterName(char);
                 return `
                     <div class="item table-card${isFixedCharacterId(id) ? ' fixed' : ''}" data-attr="${escapeHtml(attr)}" data-role="${escapeHtml(role)}">
                         <div class="checkbox-wrapper">
                             <input type="checkbox" id="c${id}" class="char-cb${isFixedCharacterId(id) ? ' fixed-cb' : ''}"${getCheckboxAttrs(id)}>
                         </div>
                         <div class="table-info">
                             <label for="c${id}" class="table-name">
                                 ${roleIcon ? `<img class="role-icon" src="${roleIcon}" alt="${escapeHtml(role)}" title="${escapeHtml(role)}">` : ''}
                                 <span>${escapeHtml(name)}</span>
                             </label>
                             <div class="table-date">${escapeHtml(dateText)}</div>
                         </div>
                     </div>
                 `;
             };
         
             list.innerHTML = `
                 <div class="table-view">
                     <div class="matrix-table">
                         <div class="matrix-cell matrix-head"></div>
                         ${roleOrder.map(role => `
                             <div class="matrix-cell matrix-head">
                                 ${ROLE_ICON_MAP[role] ? `<img src="${ROLE_ICON_MAP[role]}" alt="${escapeHtml(role)}">` : ''}
                                 <span>${escapeHtml(role)}</span>
                             </div>
                         `).join('')}
         
                         ${attrOrder.map(attr => `
                             <div class="matrix-cell matrix-attr">
                                 <img src="${attrIconMap[attr]}" alt="${escapeHtml(attr)}">
                                 <span>${escapeHtml(attr)}</span>
                             </div>
                             ${roleOrder.map(role => {
                                 const chars = groups.get(`${attr}|${role}`) || [];
                                 return `
                                     <div class="matrix-cell matrix-slot">
                                         ${chars.length ? chars.map(char => renderCard(char, attr)).join('') : '<div class="matrix-empty">—</div>'}
                                     </div>
                                 `;
                             }).join('')}
                         `).join('')}
                     </div>
                 </div>
             `;
         }
         
         function getNormalCheckboxes() {
             return Array.from(document.querySelectorAll('.char-cb')).filter(cb => !cb.disabled);
         }
         
         function getCheckedIds() {
             return getNormalCheckboxes()
                 .filter(cb => cb.checked)
                 .map(cb => cb.id.replace('c', ''))
                 .sort((a, b) => Number(a) - Number(b));
         }
         
         function setCheckedIds(ids) {
             const idSet = new Set(ids.map(String));
             document.querySelectorAll('.char-cb').forEach(cb => {
                 const id = cb.id.replace('c', '');
                 if (isFixedCharacterId(id)) {
                     cb.checked = true;
                     cb.disabled = true;
                 } else {
                     cb.checked = idSet.has(id);
                 }
             });
         }
         
         function saveToLocalStorage() {
             localStorage.setItem(STORAGE_KEY, JSON.stringify(getCheckedIds()));
         }
         
         function loadFromLocalStorage() {
             const saved = localStorage.getItem(STORAGE_KEY);
             if (!saved) return false;
             try {
                 const ids = JSON.parse(saved);
                 if (!Array.isArray(ids)) return false;
                 setCheckedIds(ids);
                 return true;
             } catch (error) {
                 console.warn('讀取本機儲存失敗，已忽略舊資料。', error);
                 return false;
             }
         }
         
         function bigIntToBaseX(value) {
         if (value === 0n) return '0';
         
         let result = '';
         let n = value;
         const base = BigInt(BASE_CHARS.length);
         
         while (n > 0n) {
         const index = Number(n % base);
         result = BASE_CHARS[index] + result;
         n = n / base;
         }
         
         return result;
         }
         
         function parseBaseXToBigInt(value) {
         let result = 0n;
         const base = BigInt(BASE_CHARS.length);
         
         for (const ch of String(value)) {
         const digit = BASE_CHARS.indexOf(ch);
         if (digit < 0) throw new Error('Invalid key');
         result = result * base + BigInt(digit);
         }
         
         return result;
         }
         
         function encodeIdsToKey(ids) {
         let bits = 0n;
         ids.forEach(id => {
         const n = BigInt(Number(id));
         if (n >= 0n) bits |= (1n << n);
         });
         return bigIntToBaseX(bits);
         }
         
         function decodeKeyToIds(key) {
         if (!key || key === '0') return [];
         const bits = parseBaseXToBigInt(key);
         const maxId = Math.max(0, ...getNormalCheckboxes().map(cb => Number(cb.id.replace('c', ''))));
         const ids = [];
         for (let i = 0; i <= maxId; i++) {
         if ((bits & (1n << BigInt(i))) !== 0n) ids.push(String(i));
         }
         return ids;
         }
         
         function resetTable() {
             if (confirm('確定要重置所有勾選嗎？')) {
                 setCheckedIds([]);
                 localStorage.removeItem(STORAGE_KEY);
                 syncShareUrl();
             }
         }
         function clearAllFilters() {
             if (!confirm('確定要清除所有篩選嗎？')) return;
             activeAttrFilters.clear();
             activeRoleFilters.clear();
             saveFilterState();
             applyFilters();
         }
         async function copyUrl() {
             const urlText = getShareUrl();
             document.getElementById('result-url').innerText = urlText;
             saveToLocalStorage();
             try {
                 await navigator.clipboard.writeText(urlText);
                 alert('網址已複製到剪貼簿！');
             } catch (error) {
                 prompt('瀏覽器無法自動複製，請手動複製：', urlText);
             }
         }
         
         function loadFromUrl() {
             const params = new URLSearchParams(window.location.search);
             const key = params.get('k');
             const legacyChars = params.get('chars');
         
             if (key !== null) {
                 try {
                     const ids = decodeKeyToIds(key);
                     setCheckedIds(ids);
                     saveToLocalStorage();
                     syncShareUrl();
                     return true;
                 } catch (error) {
                     console.warn('網址短碼解析失敗，已改用本機記錄。', error);
                     return false;
                 }
             }
         
             if (legacyChars !== null) {
                 const ids = legacyChars.split(',').map(id => id.trim()).filter(Boolean);
                 setCheckedIds(ids);
                 saveToLocalStorage();
                 syncShareUrl();
                 return true;
             }
         
             return false;
         }
         
         async function init() {
             applyTheme();
             setupLanguageSelect();
             applyUiLanguage();
             setupViewButtons();
             document.body.setAttribute("data-view", currentView);
             setupFilterButtons();
             loadFilterState();
             updateFilterButtons();
             try {
                 const response = await fetch(DATA_FILE, { cache: 'no-store' });
                 if (!response.ok) throw new Error(`HTTP ${response.status}`);
                 allCharacters = await response.json();
                 allCharacters.sort((a, b) => new Date(b.date) - new Date(a.date));
                 renderCharacters(allCharacters);
                 applyFilters();
         
                 const loadedFromUrl = loadFromUrl();
                 if (!loadedFromUrl) {
                     loadFromLocalStorage();
                     syncShareUrl();
                 }
         
                 bindCheckboxEvents();
             } catch (error) {
                 console.error(error);
                 document.getElementById('dynamic-list').innerHTML = '<div class="error">讀取 characters.json 失敗，請確認 index.html 和 characters.json 放在同一個資料夾。</div>';
                 document.getElementById('result-url').innerText = '資料讀取失敗';
             }
         }
         
         document.addEventListener('DOMContentLoaded', init);
      </script>
   </body>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色持有清單</title>
    <style>
        :root {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
            --border: #e5e7eb;
            --primary: #2563eb;
            --danger: #ef4444;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 550px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 40px;
        }
        header {
            padding: 20px;
            background: #ffffff;
            border-bottom: 2px solid var(--border);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        h1 { margin: 0 0 14px; }
        .control-panel {
            padding: 15px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .button-group { display: flex; gap: 10px; }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.88; }
        .btn-copy { background-color: #10b981; color: white; }
        .btn-reset { background-color: var(--danger); color: white; }
        #result-url {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.8rem;
            background: white;
            word-break: break-all;
            min-height: 20px;
            text-align: left;
        }
        .list-wrapper { max-height: 70vh; overflow-y: auto; }
        .item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }
        .checkbox-wrapper { margin-right: 18px; display: flex; align-items: center; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; }
        input[type="checkbox"]:disabled { cursor: not-allowed; }
        .info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .main-line { display: flex; align-items: center; font-size: 1.05rem; font-weight: 600; cursor: pointer; }
        .fixed .main-line { cursor: default; }
        .fixed { background: #fafafa; }
        .attr-tag {
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-right: 10px;
            min-width: 35px;
            text-align: center;
            color: #ffffff;
            flex-shrink: 0;
        }
        .date-line { font-size: 0.85rem; color: var(--text-sub); padding-left: 55px; }
        .loading, .error { padding: 20px; color: var(--text-sub); text-align: center; }
        .error { color: var(--danger); }

        .tag-火 { background-color: #b91c1c; }
        .tag-冰, .tag-氷 { background-color: #0ea5e9; }
        .tag-雷 { background-color: #eab308; color: #000000; }
        .tag-風 { background-color: #15803d; }
        .tag-斬 { background-color: #4b5563; }
        .tag-打 { background-color: #78350f; }
        .tag-突 { background-color: #4338ca; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>角色持有清單</h1>
            <div class="control-panel">
                <div id="result-url">讀取中...</div>
                <div class="button-group">
                    <button class="btn-copy" onclick="copyUrl()">複製網址</button>
                    <button class="btn-reset" onclick="resetTable()">Reset 表格</button>
                </div>
            </div>
        </header>
        <div class="list-wrapper">
            <div id="dynamic-list">
                <div class="loading">角色資料讀取中...</div>
            </div>
            <!-- 固定角色：固定寫在 index.html，JSON 角色會載入在這兩位上面 -->
            <div class="item fixed">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="c189" class="char-cb fixed-cb" checked disabled>
                </div>
                <div class="info">
                    <label for="c189" class="main-line">
                        <span class="attr-tag tag-火">火</span>
                        蕾斯娜【未來に夢を求めし者】
                    </label>
                    <span class="date-line">初始固定角色</span>
                </div>
            </div>
            <div class="item fixed">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="c180" class="char-cb fixed-cb" checked disabled>
                </div>
                <div class="info">
                    <label for="c180" class="main-line">
                        <span class="attr-tag tag-風">風</span>
                        夏莉絲堤菈【族長的娘】
                    </label>
                    <span class="date-line">初始固定角色</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'resleri_character_checked_ids_v1';
        const DATA_FILE = 'characters.json';

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderCharacters(characters) {
            const list = document.getElementById('dynamic-list');
            list.innerHTML = characters.map(char => {
                const id = Number(char.id);
                const dateText = char.note || (char.date ? `開放日期：${char.date}` : '');
                return `
                    <div class="item">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="c${id}" class="char-cb">
                        </div>
                        <div class="info">
                            <label for="c${id}" class="main-line">
                                <span class="attr-tag tag-${escapeHtml(char.attr)}">${escapeHtml(char.attr)}</span>
                                ${escapeHtml(char.name)}
                            </label>
                            <span class="date-line">${escapeHtml(dateText)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getNormalCheckboxes() {
            return Array.from(document.querySelectorAll('.char-cb')).filter(cb => !cb.disabled);
        }

        function getCheckedIds() {
            return getNormalCheckboxes()
                .filter(cb => cb.checked)
                .map(cb => cb.id.replace('c', ''))
                .sort((a, b) => Number(a) - Number(b));
        }

        function setCheckedIds(ids) {
            const idSet = new Set(ids.map(String));
            getNormalCheckboxes().forEach(cb => {
                cb.checked = idSet.has(cb.id.replace('c', ''));
            });
        }

        function saveToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(getCheckedIds()));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return false;
            try {
                const ids = JSON.parse(saved);
                if (!Array.isArray(ids)) return false;
                setCheckedIds(ids);
                return true;
            } catch (error) {
                console.warn('讀取本機儲存失敗，已忽略舊資料。', error);
                return false;
            }
        }

        function encodeIdsToKey(ids) {
            // 用 BigInt bitmask 壓縮勾選狀態：id 2,3,10 會變成很短的 36 進位字串
            let bits = 0n;
            ids.forEach(id => {
                const n = BigInt(Number(id));
                if (n >= 0n) bits |= (1n << n);
            });
            return bits.toString(36);
        }

        function parseBase36ToBigInt(value) {
            const chars = '0123456789abcdefghijklmnopqrstuvwxyz';
            let result = 0n;
            for (const ch of String(value).toLowerCase()) {
                const digit = chars.indexOf(ch);
                if (digit < 0) throw new Error('Invalid base36 key');
                result = result * 36n + BigInt(digit);
            }
            return result;
        }

        function decodeKeyToIds(key) {
            if (!key || key === '0') return [];
            const bits = parseBase36ToBigInt(key);
            const maxId = Math.max(
                0,
                ...getNormalCheckboxes().map(cb => Number(cb.id.replace('c', '')))
            );
            const ids = [];
            for (let i = 0; i <= maxId; i++) {
                if ((bits & (1n << BigInt(i))) !== 0n) ids.push(String(i));
            }
            return ids;
        }

        function getShareUrl() {
            const selectedIds = getCheckedIds();
            const baseUrl = window.location.href.split('?')[0];
            if (selectedIds.length === 0) return baseUrl;
            const key = encodeIdsToKey(selectedIds);
            return `${baseUrl}?k=${encodeURIComponent(key)}`;
        }

        function syncShareUrl(options = {}) {
            const { updateAddressBar = true } = options;
            const finalUrl = getShareUrl();
            document.getElementById('result-url').innerText = finalUrl;
            if (updateAddressBar && window.history && window.history.replaceState) {
                window.history.replaceState({}, document.title, finalUrl);
            }
            saveToLocalStorage();
            return finalUrl;
        }

        function resetTable() {
            if (confirm('確定要重置所有勾選嗎？')) {
                getNormalCheckboxes().forEach(cb => cb.checked = false);
                localStorage.removeItem(STORAGE_KEY);
                syncShareUrl();
            }
        }

        async function copyUrl() {
            const urlText = syncShareUrl();
            try {
                await navigator.clipboard.writeText(urlText);
                alert('網址已複製到剪貼簿！');
            } catch (error) {
                prompt('瀏覽器無法自動複製，請手動複製：', urlText);
            }
        }

        function loadFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get('k');
            const legacyChars = params.get('chars');

            if (key !== null) {
                try {
                    const ids = decodeKeyToIds(key);
                    setCheckedIds(ids);
                    saveToLocalStorage();
                    syncShareUrl();
                    return true;
                } catch (error) {
                    console.warn('網址短碼解析失敗，已改用本機記錄。', error);
                    return false;
                }
            }

            // 相容舊版 ?chars=1,2,3&seed=... 網址；打開後會自動轉成新版 ?k=...
            if (legacyChars !== null) {
                const ids = legacyChars.split(',').map(id => id.trim()).filter(Boolean);
                setCheckedIds(ids);
                saveToLocalStorage();
                syncShareUrl();
                return true;
            }

            return false;
        }

        async function init() {
            try {
                const response = await fetch(DATA_FILE, { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const characters = await response.json();
                renderCharacters(characters);

                const loadedFromUrl = loadFromUrl();
                if (!loadedFromUrl) {
                    loadFromLocalStorage();
                    syncShareUrl();
                }

                getNormalCheckboxes().forEach(cb => {
                    cb.addEventListener('change', () => syncShareUrl());
                });
            } catch (error) {
                console.error(error);
                document.getElementById('dynamic-list').innerHTML = '<div class="error">讀取 characters.json 失敗，請確認 index.html 和 characters.json 放在同一個資料夾。</div>';
                document.getElementById('result-url').innerText = '資料讀取失敗';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

             document.body.classList.toggle('light', currentTheme === 'light');
             const btn = document.getElementById('theme-toggle');
             if (btn) btn.textContent = currentTheme === 'dark' ? '💡' : '☪';
         }
         
         function toggleTheme() {
             currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
             localStorage.setItem('theme', currentTheme);
             applyTheme();
         }

             const langSelect = document.getElementById('lang-select');
             if (!langSelect) return;
             langSelect.value = currentLang;
             langSelect.addEventListener('change', () => {
                 currentLang = langSelect.value;
                 localStorage.setItem('lang', currentLang);
                 applyUiLanguage();
                 rerenderCharactersKeepChecked();
             });
         }
         
         function applyReadOnlyMode() {
         const banner = document.getElementById('share-readonly-banner');
         if (!banner) return;
         
         if (isReadOnlyMode) {
         banner.classList.remove('hidden');
         } else {
         banner.classList.add('hidden');
         }
         
         document.querySelectorAll('.char-cb:not(.fixed-cb)').forEach(cb => {
         cb.disabled = isReadOnlyMode;
         });
         
         document.querySelectorAll('#select-all, [data-col], [data-row]').forEach(cb => {
         cb.disabled = isReadOnlyMode;
         });
         }
         
         function applyUiLanguage() {
             const text = UI_TEXT[currentLang] || UI_TEXT.zh;
             const title = document.getElementById('page-title');
             const copyBtn = document.getElementById('copy-btn');
             const resetBtn = document.getElementById('reset-btn');
             const viewIconBtn = document.getElementById('view-icon-btn');
             const viewTableBtn = document.getElementById('view-table-btn');
             const viewListBtn = document.getElementById('view-list-btn');
             const setButtonLabel = (btn, label) => {
                 if (!btn) return;
                 const labelEl = btn.querySelector('.btn-label');
                 if (labelEl) labelEl.textContent = label;
                 else btn.textContent = label;
             };
             if (title) title.textContent = text.title;
             if (copyBtn) {
                 copyBtn.title = text.copy;
                 const copyImg = copyBtn.querySelector('img');
                 if (copyImg) copyImg.alt = text.copy;
             }
             setButtonLabel(resetBtn, text.reset);
             setButtonLabel(viewIconBtn, text.viewIcon);
             setButtonLabel(viewListBtn, text.viewList);
             setButtonLabel(viewTableBtn, text.viewTable);
             document.querySelectorAll('[data-i18n]').forEach(el => {
         const key = el.dataset.i18n;
         if (text[key]) {
         el.textContent = text[key];
         }
         });

         el.dataset.date = rawDate;
         el.textContent = `${text.releaseDate}${rawDate}`;
         });
         }

                     const mode = btn.dataset.viewMode;
                     if (!mode || mode === currentView) return;
                     const checkedIds = JSON.parse(localStorage.getItem('checkedIds') || '[]');
                     currentView = mode;
                     document.body.setAttribute("data-view", currentView);
                     localStorage.setItem('viewMode', currentView);
                     renderCharacters(allCharacters);
                     applyUiLanguage();
                     setCheckedIds(checkedIds);
                     syncOwnedState();
                     bindCheckboxEvents();
                     setupCardClickEvents();
                     setupTableSelectAll();
                     applyFilters();
                     updateViewButtons();
                 });
             });

         function syncOwnedState() {
         document.querySelectorAll('.table-card, .icon-card').forEach(card => {
         const cb = card.querySelector('input[type="checkbox"]');
         if (!cb) return;
         card.classList.toggle('owned', cb.checked);
         });
         }
         
         function updateViewButtons() {
             document.querySelectorAll('[data-view-mode]').forEach(btn => {
                 btn.classList.toggle('active', btn.dataset.viewMode === currentView);
             });
         }
         
         function setupCardClickEvents() {
         document.querySelectorAll('.table-card, .icon-card').forEach(card => {
         card.onclick = (e) => {
            if (isReadOnlyMode) return;
            if (e.target.closest('input, label')) return;
         
            const checkbox = card.querySelector('input[type="checkbox"]');
            if (!checkbox || checkbox.disabled) return;
         
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event('change'));
         
            syncOwnedState();
            updateTableSelectAllState();
         };
         });
         }

         function encodeIdsToKey(ids) {
         
         const nums = ids
         .map(v => Number(v))
         .filter(v => Number.isInteger(v) && v >= 0);
         
         if (!nums.length) return '';
         
         const maxId = Math.max(...nums);
         
         const bits = new Array(maxId + 1).fill(0);
         
         nums.forEach(id => {
         bits[id] = 1;
         });
         
         let binary = '';
         
         for (let i = 0; i < bits.length; i += 8) {
         
         let byte = 0;
         
         for (let b = 0; b < 8; b++) {
         
            if (bits[i + b]) {
                byte |= (1 << b);
            }
         
         }
         
         binary += String.fromCharCode(byte);
         }
         
         return btoa(binary)
         .replace(/\+/g, '-')
         .replace(/\//g, '_')
         .replace(/=+$/, '');
         }
         
         function decodeKeyToIds(key) {
         
         if (!key) return [];
         
         try {
         
         key = key
            .replace(/-/g, '+')
            .replace(/_/g, '/');
         
         while (key.length % 4) {
            key += '=';
         }
         
         const binary = atob(key);
         
         const result = [];
         
         for (let i = 0; i < binary.length; i++) {
         
            const byte = binary.charCodeAt(i);
         
            for (let b = 0; b < 8; b++) {
         
                if (byte & (1 << b)) {
                    result.push(i * 8 + b);
                }
         
            }
         
         }
         
         return result.map(String);
         
         } catch {
         
         return [];
         
         }
         
         }

         Object.entries(TAG_MAP).find(
         ([tagId, tagName]) =>
         tagName === match[1]
         );
         
         if (tag) {

         matchedCharacters =
         allCharacters.filter(c =>
         c.tag_ids?.includes(tagId)
         );
         
         }
         
         }

         async function init() {

         }
         
         // ===== Patch Note =====
         const PATCH_NOTE_FILE = 'patch_notes.json';
         const PATCH_NOTE_KEY = 'patch_note_seen';
         let patchNoteVersion = null;
         let patchNoteLoaded = false;
         
         function renderDetail(detail) {
         
         if (typeof detail === 'string') {
         return escapeHtml(detail);
         }
         
         if (detail.type === 'link') {
         return `
         <a href="${escapeHtml(detail.url)}"
           target="_blank"
           rel="noopener noreferrer">
           ${escapeHtml(detail.text)}
         </a>
         `;
         }
         
         const labelMap = {
         new: 'NEW',
         fix: 'FIX',
         improve: 'UPD'
         };
         
         const contents =
         Array.isArray(detail.contents)
         ? detail.contents
         : [detail.content || ''];
         
         if (labelMap[detail.type]) {
         
         return `
         <span class="patch-badge patch-${detail.type}">
            ${labelMap[detail.type]}
         </span>
         
         <ul class="patch-content-list">
            ${contents.map(content => `
                <li>
                    ${escapeHtml(content)
                    .replace(/\\n/g, '<br>')}
                </li>
            `).join('')}
         </ul>
         `;
         }
         
         return `
         <ul class="patch-content-list">
         ${contents.map(content => `
            <li>
                ${escapeHtml(content)
                .replace(/\\n/g, '<br>')}
            </li>
         `).join('')}
         </ul>
         `;
         }
         function togglePatchNote() {
             const panel = document.getElementById('patch-note-panel');
             if (!panel) return;
         
             panel.classList.toggle('hidden');
         
             if (!panel.classList.contains('hidden')) {
                 if (!patchNoteLoaded) {
                     loadPatchNotes();
                 }
         
                 if (patchNoteVersion) {
                     localStorage.setItem(PATCH_NOTE_KEY, patchNoteVersion);
                     updatePatchDot();
                 }
             }
         }
         
         async function loadPatchNotes() {
             const content = document.getElementById('patch-note-content');
             if (!content) return;
         
             try {
                 const response = await fetch(PATCH_NOTE_FILE, { cache: 'no-store' });
                 if (!response.ok) throw new Error(`HTTP ${response.status}`);
         
                 const data = await response.json();
                 patchNoteVersion = data.version;
                 const notes = data.notes || [];
         
                 content.innerHTML = notes.map(note => `
                     <div class="patch-note-entry">
                         <div class="patch-note-date">${escapeHtml(note.date || '')}</div>
                         <strong>${escapeHtml(note.title || '')}</strong>
         
                         <ul class="patch-main-list">
                             ${(note.items || []).map(item => `
                                 <li>
                                     <span>${escapeHtml(item.text || '')}</span>
         
                                     ${(item.details || []).length ? `
                                         <ul class="patch-sub-list">
                                             ${item.details.map(detail => `
                                                 <li>${renderDetail(detail)}</li>
                                                 `).join('')}
                                         </ul>
                                     ` : ''}
                                 </li>
                             `).join('')}
                         </ul>
                     </div>
                 `).join('');
         
                 patchNoteLoaded = true;
                 updatePatchDot();
         
             } catch (error) {
                 console.error(error);
                 content.innerHTML = '<div class="error">Patch Note 讀取失敗</div>';
             }
         }
         
         function updatePatchDot() {
             const btn = document.getElementById('patch-note-btn');
             if (!btn || !patchNoteVersion) return;
         
             const seen = localStorage.getItem(PATCH_NOTE_KEY);
         
             if (seen !== patchNoteVersion) {
                 btn.classList.add('has-update');
             } else {
                 btn.classList.remove('has-update');
             }
         }

         ? 'jp'

         currentSkill[langKey] ||
         currentSkill.zh ||
         currentSkill.jp ||
         currentSkill.en ||
         ''
         
         ;(value?.effects || []).forEach((effect, index) => {
         
         const num =
         effect.value / 100
         
         desc = desc.replaceAll(
         `{${index}}`,
         num
         )
         })
         
         return `
         
         <div class="skill-box">
         
         <div class="skill-title">
         
         <span>
            ${title} - ${currentSkill.name}

         <span class="stat-wait"><img src="images/ui/wait2.png" class="stat-icon" title="${UI_TEXT[currentLang].wait}">${200 + (value?.wait ?? 0) <= 0 ? '-' : `${200 + (value?.wait ?? 0)}`}</span>
         
         </div>
         </div>
         
         <div class="skill-desc">
         ${parseSkillLinks(desc || '')}
         </div>
         
         </div>
         
         `;
         }
         document.addEventListener('keydown', (e) => {
           if (e.key === 'Escape') {
             closeSkillModal();

         function isSixStar(c) {

      </script>

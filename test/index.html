<!DOCTYPE html>
<html lang="zh-Hant">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>角色持有清單</title>
      <link rel="icon" href="favicon.ico">
      <style>
         /* ===== 全局共用：色彩變數 / 深淺色主題 ===== */
         :root {
         --bg-body: #020617;
         --bg-card: #0f172a;
         --bg-panel: #111827;
         --text-main: #f8fafc;
         --text-sub: #94a3b8;
         --border: #1e293b;
         --primary: #3b82f6;
         --danger: #ef4444;
         }
         body.light {
         --bg-body: #e5e7eb;
         --bg-card: #f1f5f9;
         --bg-panel: #e5e7eb;
         --text-main: #111827;
         --text-sub: #6b7280;
         --border: #d1d5db;
         }
         /* ===== 全局共用：頁面基本版面 ===== */
         body {
         font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
         background-color: var(--bg-body);
         color: var(--text-main);
         margin: 0;
         padding: 20px;
         display: flex;
         justify-content: center;
         }
         body[data-view="list"] .container {
         max-width: 640px;
         }
         body[data-view="table"] .container {
         max-width: 1280px;
         }
         .container {
         width: 100%;
         max-width: 550px;
         background: var(--bg-card);
         border-radius: 16px;
         box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
         overflow: hidden;
         margin-bottom: 40px;
         }
         /* ===== 全局共用：頁首 / 標題 / 語言 / 主題切換 ===== */
         header {
         padding: 20px;
         background: var(--bg-card);
         border-bottom: 1px solid rgba(255,255,255,0.06);
         text-align: center;
         position: sticky;
         top: 0;
         z-index: 10;
         }
         h1 { margin: 0 0 14px; }
         /* ===== 全局共用：控制面板 / URL / 按鈕 ===== */
         .control-panel {
         padding: 15px;
         background: var(--bg-panel);
         border-bottom: 1px solid rgba(255,255,255,0.06);
         display: flex;
         flex-direction: column;
         gap: 10px;
         }
         .button-group { display: flex; gap: 10px; }
         button {
         flex: 1;
         padding: 10px;
         border: none;
         border-radius: 8px;
         font-weight: 600;
         cursor: pointer;
         transition: opacity 0.2s, background-color 0.2s, border-color 0.2s;
         }
         button:hover { opacity: 0.88; }
         .btn-copy { background-color: #10b981; color: white; }
         .btn-reset { background-color: var(--danger); color: white; }
         #result-url {
         width: 100%;
         box-sizing: border-box;
         padding: 8px;
         border: 1px solid var(--border);
         border-radius: 4px;
         font-size: 0.8rem;
         background: var(--bg-panel);
         color: var(--text-main);
         word-break: break-all;
         min-height: 20px;
         text-align: left;
         }
         /* ===== 全局共用：屬性 / 職種篩選按鈕 ===== */
         .filter-title {
         font-size: 0.82rem;
         color: var(--text-sub);
         text-align: left;
         margin-top: 2px;
         margin-bottom: -4px;
         font-weight: 700;
         }
         .filter-panel {
         display: flex;
         flex-wrap: wrap;
         gap: 8px;
         padding-top: 4px;
         align-items: center;
         }
         .filter-btn {
         flex: 0 0 auto;
         padding: 7px 11px;
         border: 1px solid var(--border);
         border-radius: 999px;
         background: var(--bg-panel);
         color: var(--text-main);
         font-size: 0.88rem;
         }
         .filter-btn.active {
         background: var(--primary);
         color: #ffffff;
         border-color: var(--primary);
         }
         .role-filter-panel {
         gap: 10px;
         }
         .role-filter-btn {
         flex: 0 0 auto;
         width: 42px;
         height: 42px;
         padding: 4px;
         border-radius: 999px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         opacity: 0.65;
         }
         .role-filter-btn img {
         width: 100%;
         height: 100%;
         object-fit: contain;
         display: block;
         }
         .role-filter-btn.active {
         opacity: 1;
         background: rgba(59, 130, 246, 0.22);
         border-color: var(--primary);
         box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18);
         }
         /* ===== 全局共用：資料狀態 / 篩選隱藏 ===== */
         .item.hidden-by-filter { display: none; }
         /* ===== 全局共用：共用 item / checkbox 基礎 ===== */
         .list-wrapper { max-height: 70vh; overflow-y: auto; }
         .item {
         display: flex;
         align-items: center;
         padding: 14px 20px;
         border-bottom: 2px solid var(--border);
         }
         .checkbox-wrapper { margin-right: 18px; display: flex; align-items: center; }
         input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; }
         input[type="checkbox"]:disabled { cursor: not-allowed; }
         /* ===== 列表模式：角色文字資訊 ===== */
         .info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
         .main-line { display: flex; align-items: center; font-size: 1.05rem; font-weight: 600; cursor: pointer; line-height: 1.35; }
         .fixed .main-line { cursor: default; }
         .fixed {
         background: var(--bg-card);
         }
         /* ===== 全局共用：屬性標籤與職種小圖示 ===== */
         .attr-tag {
         padding: 2px 10px;
         border-radius: 6px;
         font-size: 0.8rem;
         font-weight: bold;
         margin-right: 8px;
         min-width: 35px;
         text-align: center;
         color: #ffffff;
         flex-shrink: 0;
         }
         .role-icon {
         width: 28px;
         height: 28px;
         object-fit: contain;
         margin-right: 8px;
         flex-shrink: 0;
         }
         .date-line { font-size: 0.85rem; color: var(--text-sub); padding-left: 55px; }
         .loading, .error { padding: 20px; color: var(--text-sub); text-align: center; }
         .error { color: var(--danger); }
         /* ===== 全局共用：屬性標籤顏色 ===== */
         .tag-火 { background-color: #b91c1c; }
         .tag-冰 { background-color: #0ea5e9; }
         .tag-雷 { background-color: #eab308; color: #000000; }
         .tag-風 { background-color: #15803d; }
         .tag-斬 { background-color: #4b5563; }
         .tag-打 { background-color: #78350f; }
         .tag-突 { background-color: #4338ca; }
         .title-row {
         position: relative;
         display: flex;
         justify-content: center;
         align-items: center;
         margin: 0 0 14px;
         }
         .title-row h1 {
         margin: 0;
         color: var(--text-main);
         padding: 0 180px 0 20px;
         font-size: clamp(1.4rem, 4vw, 2rem);
         white-space: nowrap;
         }
         .theme-toggle {
         position: static;
         transform: none;
         width: 36px;
         height: 36px;
         padding: 0;
         border-radius: 999px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         color: var(--text-main);
         font-size: 18px;
         line-height: 1;
         cursor: pointer;
         flex: 0 0 auto;
         display: flex;
         align-items: center;
         justify-content: center;
         }
         /* ===== 全局共用：手機版基礎響應式 ===== */
         @media (max-width: 480px) {
         body { padding: 12px; }
         header { padding: 16px; }
         .item { padding: 13px 14px; }
         .checkbox-wrapper { margin-right: 14px; }
         .role-filter-btn { width: 40px; height: 40px; }
         }
         /* ===== 全局共用：清除篩選按鈕 / 推右工具 ===== */
         .clear-btn {
         width: 42px;
         height: 42px;
         padding: 4px;
         border-radius: 999px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         display: flex;
         align-items: center;
         justify-content: center;
         font-size: 18px;
         color: #ef4444;
         opacity: 1;
         }
         .clear-btn:hover {
         background: #fee2e2;
         border-color: #ef4444;
         }
         .clear-btn.active {
         background: #ffffff !important;
         border-color: var(--border) !important;
         box-shadow: none !important;
         opacity: 1;
         }
         .push-right {
         margin-left: auto;
         }
         .attr-btn {
         flex: 0 0 auto;
         width: 42px;
         height: 42px;
         padding: 4px;
         border-radius: 999px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         opacity: 0.70;
         }
         .attr-btn img {
         width: 100%;
         height: 100%;
         object-fit: contain;
         display: block;
         }
         .attr-btn.active {
         opacity: 1;
         background: rgba(59, 130, 246, 0.22);
         border-color: var(--primary);
         box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18);
         }
         /* ===== 全局共用：標題右側操作區 ===== */
         .title-actions {
         position: absolute;
         right: 0;
         top: 50%;
         transform: translateY(-50%);
         display: flex;
         gap: 8px;
         align-items: center;
         }
         /* ===== 全局共用：列表/表格切換按鈕 ===== */
         .view-toggle {
         display: flex;
         gap: 8px;
         }
         .view-btn {
         flex: 1;
         padding: 8px 10px;
         border-radius: 8px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         color: var(--text-main);
         }
         .view-btn.active {
         background: var(--primary);
         color: #ffffff;
         border-color: var(--primary);
         }
         /* ===== 表格模式：外層表格 / 矩陣 ===== */
         .table-view {
         overflow-x: auto;
         border-top: 1px solid var(--border);
         }
         .matrix-table {
         min-width: 1180px;
         display: grid;
         grid-template-columns: 90px repeat(4, minmax(260px, 1fr));
         border-left: 1px solid var(--border);
         border-top: 1px solid var(--border);
         }
         /* ===== 表格模式：矩陣格線與標題 ===== */
         .matrix-cell {
         border-right: 1px solid var(--border);
         border-bottom: 1px solid var(--border);
         background: var(--bg-card);
         min-height: 80px;
         }
         .matrix-head {
         position: sticky;
         top: 0;
         z-index: 2;
         min-height: auto;
         padding: 10px 8px;
         background: var(--bg-panel);
         font-size: 0.85rem;
         font-weight: 700;
         text-align: center;
         display: flex;
         align-items: center;
         justify-content: center;
         gap: 6px;
         }
         .matrix-head img {
         width: 24px;
         height: 24px;
         object-fit: contain;
         }
         .matrix-attr {
         position: sticky;
         left: 0;
         z-index: 1;
         background: var(--bg-panel);
         display: flex;
         align-items: center;
         justify-content: center;
         gap: 6px;
         font-size: 0.85rem;
         font-weight: 700;
         }
         .matrix-attr img {
         width: 28px;
         height: 28px;
         object-fit: contain;
         }
         /* ===== 表格模式：矩陣內容格 ===== */
         .matrix-slot {
         padding: 4px;
         display: grid;
         grid-template-columns: repeat(3, minmax(0, 1fr));  /* 🔥 grid-template-columns: repeat(3, 1fr); 🔥 一行三個 */
         gap: 2px;
         }
         @media (max-width: 900px) { 				/*控制手機模式兩個、電腦模式三個*/
         .matrix-slot {
         grid-template-columns: repeat(2, 1fr);
         }
         }
         @media (min-width: 901px) {
         .matrix-slot {
         grid-template-columns: repeat(3, 1fr);
         }
         }
         /* ===== 表格模式：舊版文字卡片樣式 ===== */
         .table-card {
         display: flex;
         align-items: flex-start;
         gap: 8px;
         padding: 8px 10px;
         border: 1px solid var(--border);
         border-radius: 8px;
         background: var(--bg-panel);
         min-height: 58px;
         }
         .table-card .checkbox-wrapper {
         margin-right: 0;
         padding-top: 2px;
         }
         .table-card input[type="checkbox"] {
         width: 18px;
         height: 18px;
         }
         .table-info {
         min-width: 0;
         flex: 1;
         }
         .table-name {
         display: flex;
         align-items: center;
         gap: 4px;
         font-size: 0.8rem;
         font-weight: 600;
         line-height: 1.35;
         word-break: break-word;
         cursor: pointer;
         }
         .table-name .role-icon {
         width: 20px;
         height: 20px;
         margin-right: 0;
         }
         .table-date {
         margin-top: 3px;
         font-size: 0.7rem;
         color: var(--text-sub);
         }
         .matrix-empty {
         color: var(--text-sub);
         font-size: 0.75rem;
         padding: 8px;
         opacity: 0.6;
         }
         @media (max-width: 700px) {
         .matrix-table {
         min-width: 1180px;
         grid-template-columns: 90px repeat(4, minmax(260px, 1fr));
         }
         }
         /* ===== 表格模式：全選 / 列選 / 欄選 ===== */
         .select-label {
         display: inline-flex;
         align-items: center;
         justify-content: center;
         gap: 4px;
         font-size: 0.72rem;
         font-weight: 700;
         line-height: 1;
         cursor: pointer;
         user-select: none;
         white-space: nowrap;
         }
         .select-label input[type="checkbox"] {
         width: 16px;
         height: 16px;
         margin: 0;
         flex: 0 0 auto;
         }
         .matrix-head,
         .matrix-attr {
         flex-direction: column;
         }
         .matrix-title-line,
         .attr-title-line {
         display: inline-flex;
         align-items: center;
         justify-content: center;
         gap: 6px;
         }
         .table-card {
         cursor: pointer;
         }
         /* ===== 全局共用：URL列 / 複製按鈕 / 動作列 ===== */
         .url-row {
         display: flex;
         align-items: stretch;
         gap: 0;
         }
         .url-row #result-url {
         flex: 1;
         border-radius: 8px 0 0 8px;
         min-height: 38px;
         display: flex;
         align-items: center;
         }
         #copy-btn {
         flex: 0 0 auto;
         }
         .copy-icon-btn {
         flex: 0 0 auto;
         min-width: 92px;
         border-radius: 0 8px 8px 0;
         }
         .action-row {
         display: flex;
         gap: 8px;
         }
         .action-row button {
         flex: 1;
         }
         #reset-btn {
         flex: 0.7;  /* 比較短 */
         }
         /* ===== 全局共用：圖示按鈕 ===== */
         .icon-btn {
         display: inline-flex;
         align-items: center;
         justify-content: center;
         gap: 6px;
         }
         .icon-btn img {
         width: 22px;
         height: 22px;
         object-fit: contain;
         display: block;
         flex: 0 0 auto;
         }
         .copy-icon-btn img {
         width: 20px;
         height: 20px;
         }
         .lang-select {
         height: 36px;
         border-radius: 999px;
         border: 1px solid var(--border);
         background: var(--bg-panel);
         color: var(--text-main);
         padding: 0 10px;
         font-size: 0.85rem;
         font-weight: 600;
         cursor: pointer;
         }
         .icon-btn {
         flex: 0 0 auto;
         width: 42px;
         height: 42px;
         padding: 0;
         display: flex;
         align-items: center;
         justify-content: center;
         border-radius: 999px; /* 圓形 */
         transition: all 0.15s ease;
         }
         .icon-btn img {
         width: 20px;
         height: 20px;
         pointer-events: none;
         }
         .view-btn {
         display: flex;
         align-items: center;
         justify-content: center;
         gap: 6px;
         }
         .view-btn img {
         width: 18px;
         height: 18px;
         }
         .icon-btn:hover {
         transform: translateY(-1px);
         filter: brightness(1.1);
         }
         .icon-btn:active {
         transform: scale(0.92);
         }
         .btn-copy {
         background-color: #10b981;
         box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
         }
         #copy-btn {
         transition: all 0.2s ease;
         }
         .btn-reset {
         background-color: #ef4444;
         box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
         }
         /* ===== 表格模式：表格頁面微調 ===== */
         body[data-view="table"] .table-view {
         border-top: none;
         }
         body[data-view="table"] header {
         border-bottom: 1px solid rgba(255,255,255,0.06);
         }
         body[data-view="table"] .control-panel {
         border-bottom: none;
         }
         body[data-view="table"] .table-view {
         border-top: none;
         }
         .item {
         border-bottom: 1px solid rgba(255,255,255,0.05);
         }
         body[data-view="table"] .table-card {
         border: 1px solid var(--border) !important;
         border-bottom: 1px solid var(--border) !important;
         }
         .matrix-slot {
         overflow: visible;
         }
         .table-card {
         box-sizing: border-box;
         }
         .table-card .char-name {
         display: -webkit-box;
         -webkit-line-clamp: 2;       /* 最多兩行 */
         -webkit-box-orient: vertical;
         overflow: hidden;
         line-height: 1.3;
         height: calc(1.3em * 2);     /* 固定兩行高度 */
         }
         .table-card input[type="checkbox"] {
         display: none;
         }
         /* ===== 列表模式：列表邊框 ===== */
         body[data-view="list"] .list-wrapper .item:first-of-type {
         border-top: 1px solid var(--border);
         }
         body[data-view="list"] .list-wrapper .item {
         border-bottom: 1px solid var(--border);
         }
         body[data-view="list"] .list-wrapper .item:first-of-type {
         border-top: 1px solid var(--border);
         }
         /* ===== 圖示模式 ===== */
         body[data-view="icon"] .container {
         max-width: 980px;
         }
         .icon-view {
         display: grid;
         grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
         gap: 12px;
         padding: 14px;
         }
         @media (max-width: 700px) {
         .icon-view {
         grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
         gap: 6px;
         }
         }
         .icon-card {
         position: relative;
         aspect-ratio: 1 / 0.88;
         border: 1px solid var(--border);
         border-radius: 12px;
         background: var(--bg-panel);
         overflow: hidden;
         cursor: pointer;
         }
         .icon-card input[type="checkbox"] {
         display: none;
         }
         .icon-card-imag {
         width: 100%;
         height: 100%;
         object-fit: cover;
         clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
         filter: grayscale(100%);
         opacity: 0.4;
         transition: all 0.2s ease;
         }
         .icon-card.owned .icon-card-image {
         filter: none;
         opacity: 1;
         }
         .icon-card-attr {
         position: absolute;
         left: 4px;
         bottom: 4px;
         width: 24px;
         height: 24px;
         z-index: 2;
         }
         .icon-card-role {
         position: absolute;
         right: 4px;
         bottom: 4px;
         width: 24px;
         height: 24px;
         z-index: 2;
         }
         .icon-card:hover {
         transform: scale(1.05);
         box-shadow: 0 0 8px rgba(255,255,255,0.3);
         }
         .icon-card-image {
         width: 120%;
         height: 120%;
         margin-left: -8%;
         margin-top: -8%;
         object-fit: cover;
         clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
         filter: grayscale(100%);
         opacity: 0.4;
         transition: all 0.2s ease;
         }
         .icon-card:hover {
         transform: scale(1.15);
         z-index: 5;
         }
         .icon-card {
         transition: transform 0.12s ease;
         }
         /* ===== 列表模式：右側角色圖片 ===== */
         .char-image-wrapper {
         margin-left: auto;
         flex-shrink: 0;
         padding-left: 12px;
         display: flex;
         align-items: center;
         }
         .char-image {
         width: 60px;
         height: 56px;
         object-fit: cover;
         display: block;
         clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
         }
         .table-card {
         position: relative;
         width: 100%;
         aspect-ratio: 150 / 140;
         max-width: none;   /* 🔥 關鍵 */
         margin: 0 auto;     /* 置中 */
         padding: 0;
         overflow: hidden;
         border-radius: 10px;
         }
         /* ===== 表格模式：圖片卡片覆蓋樣式 ===== */
         /* 圖片 */
         .card-image img {
         width: 100%;
         height: 100%;
         object-fit: cover;
         clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
         }
         /* 未持有（預設） */
         .table-card img {
         filter: grayscale(100%);
         opacity: 0.4;
         transition: all 0.2s ease;
         }
         /* 已持有 */
         .table-card.owned img {
         filter: none;
         opacity: 1;
         }
         .table-card:hover {
         transform: scale(1.05);
         box-shadow: 0 0 8px rgba(255,255,255,0.3);
         }
         /* ===== 表格模式：職種右下角圖示 ===== */
         /* 職種右下 */
         .card-role {
         position: absolute;
         bottom: 4px;
         right: 4px;
         width: 26px;
         height: 26px;
         z-index: 2;
         }
         /* ===== 表格模式：checkbox 左上角 ===== */
         /* checkbox 左上 */
         .table-card input[type="checkbox"] {
         position: absolute;
         top: 4px;
         left: 4px;
         z-index: 3;
         }
         /* =====Patch Note 相關設置===== */
         .patch-note-panel {
         position: fixed;
         top: 80px;
         right: 20px;

                 title: '所持キャラ一覧',

                 share_readonly_text: "※現在は閲覧モードです。所持キャラリストを上書きしますか？",
                 share_overwrite: "上書き保存する",

             },

                 title: 'Character Checklist',

                 reset: 'Reset Table',
                 attrFilter: 'Attribute Filter',
                 roleFilter: 'Role Filter',
                 viewIcon: 'Grid View',
                 viewList: 'List View',

                  selectAll: 'All',

                 share_readonly_text: "Viewing mode. Overwrite your current character list?",
                 share_overwrite: "Overwrite",
                 share_cancel: "Cancel"
                  }
         };
         
         let allCharacters = [];
         let activeAttrFilters = new Set();
         let activeRoleFilters = new Set();
         let currentTheme = localStorage.getItem('theme') || 'dark';
         let currentLang = localStorage.getItem('lang') || 'zh';
         let currentView = localStorage.getItem('viewMode') || 'icon';
         let isReadOnlyMode = false;
         
         
         function applyTheme() {
             document.body.classList.toggle('light', currentTheme === 'light');
             const btn = document.getElementById('theme-toggle');
             if (btn) btn.textContent = currentTheme === 'dark' ? '💡' : '☪';
         }
         
         function toggleTheme() {
             currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
             localStorage.setItem('theme', currentTheme);
             applyTheme();
         }
         
         function setupLanguageSelect() {
             const langSelect = document.getElementById('lang-select');
             if (!langSelect) return;
             langSelect.value = currentLang;
             langSelect.addEventListener('change', () => {
                 currentLang = langSelect.value;
                 localStorage.setItem('lang', currentLang);
                 applyUiLanguage();
                 rerenderCharactersKeepChecked();
             });
         }
         
         function applyReadOnlyMode() {
         const banner = document.getElementById('share-readonly-banner');
         if (!banner) return;
         
         if (isReadOnlyMode) {
         banner.classList.remove('hidden');
         } else {
         banner.classList.add('hidden');
         }
         
         document.querySelectorAll('.char-cb:not(.fixed-cb)').forEach(cb => {
         cb.disabled = isReadOnlyMode;
         });
         
         document.querySelectorAll('#select-all, [data-col], [data-row]').forEach(cb => {
         cb.disabled = isReadOnlyMode;
         });
         }
         
         function applyUiLanguage() {
             const text = UI_TEXT[currentLang] || UI_TEXT.zh;
             const title = document.getElementById('page-title');
             const copyBtn = document.getElementById('copy-btn');
             const resetBtn = document.getElementById('reset-btn');
             const viewIconBtn = document.getElementById('view-icon-btn');
             const viewTableBtn = document.getElementById('view-table-btn');
             const viewListBtn = document.getElementById('view-list-btn');
             const setButtonLabel = (btn, label) => {
                 if (!btn) return;
                 const labelEl = btn.querySelector('.btn-label');
                 if (labelEl) labelEl.textContent = label;
                 else btn.textContent = label;
             };
             if (title) title.textContent = text.title;
             if (copyBtn) {
                 copyBtn.title = text.copy;
                 const copyImg = copyBtn.querySelector('img');
                 if (copyImg) copyImg.alt = text.copy;
             }
             setButtonLabel(resetBtn, text.reset);
             setButtonLabel(viewIconBtn, text.viewIcon);
             setButtonLabel(viewListBtn, text.viewList);
             setButtonLabel(viewTableBtn, text.viewTable);
             document.querySelectorAll('[data-i18n]').forEach(el => {
         const key = el.dataset.i18n;
         if (text[key]) {
         el.textContent = text[key];
         }
         });
         
         // ===== 日期多語（只作用在列表模式）=====
         if (currentView === 'list') {
         document.querySelectorAll('.date-line').forEach(el => {
         const rawDate = el.dataset.date || el.textContent.trim();
         el.dataset.date = rawDate;
         el.textContent = `${text.releaseDate}${rawDate}`;
         });
         }
         }
         
         function bindCheckboxEvents() {
         getNormalCheckboxes().forEach(cb => {
         cb.addEventListener('change', (e) => {
         
            if (isReadOnlyMode) {
                cb.checked = !cb.checked; // 還原
                return;
            }
         
            syncShareUrl();
         });
         });
         }
         
         function rerenderCharactersKeepChecked() {
             const checkedIds = getCheckedIds();
             renderCharacters(allCharacters);
             applyUiLanguage();
             setCheckedIds(checkedIds);
             bindCheckboxEvents();
             setupCardClickEvents();
             syncOwnedState();   
             setupTableSelectAll();
             applyFilters();
             syncShareUrl();
         }
         
         
         function setupViewButtons() {
             document.querySelectorAll('[data-view-mode]').forEach(btn => {
                 btn.addEventListener('click', () => {
                     const mode = btn.dataset.viewMode;
                     if (!mode || mode === currentView) return;
                     const checkedIds = getCheckedIds();
                     currentView = mode;
                     document.body.setAttribute("data-view", currentView);
                     localStorage.setItem('viewMode', currentView);
                     renderCharacters(allCharacters);
                     applyUiLanguage();
                     setCheckedIds(checkedIds);
                     syncOwnedState();
                     bindCheckboxEvents();
                     setupCardClickEvents();
                     setupTableSelectAll();
                     applyFilters();
                     syncShareUrl();
                     updateViewButtons();
                 });
             });
             updateViewButtons();
         }
         function syncOwnedState() {
         document.querySelectorAll('.table-card, .icon-card').forEach(card => {
         const cb = card.querySelector('input[type="checkbox"]');
         if (!cb) return;
         card.classList.toggle('owned', cb.checked);
         });
         }
         
         function updateViewButtons() {
             document.querySelectorAll('[data-view-mode]').forEach(btn => {
                 btn.classList.toggle('active', btn.dataset.viewMode === currentView);
             });
         }
         
         function setupCardClickEvents() {
         document.querySelectorAll('.table-card, .icon-card').forEach(card => {
         card.onclick = (e) => {
            if (isReadOnlyMode) return;
            if (e.target.closest('input, label')) return;
         
            const checkbox = card.querySelector('input[type="checkbox"]');
            if (!checkbox || checkbox.disabled) return;
         
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event('change'));
         
            syncOwnedState();
            updateTableSelectAllState();
         };
         });
         }
         function setupTableSelectAll() {
             const visibleNormalCards = () => Array.from(document.querySelectorAll('.table-card:not(.hidden-by-filter) input[type="checkbox"]:not(:disabled)'));
             const visibleNormalCardsByRole = (role) => Array.from(document.querySelectorAll(`.table-card:not(.hidden-by-filter)[data-role="${CSS.escape(role)}"] input[type="checkbox"]:not(:disabled)`));
             const visibleNormalCardsByAttr = (attr) => Array.from(document.querySelectorAll(`.table-card:not(.hidden-by-filter)[data-attr="${CSS.escape(attr)}"] input[type="checkbox"]:not(:disabled)`));
         
             const setBoxes = (boxes, checked) => {
                 boxes.forEach(cb => {
                     cb.checked = checked;
                     cb.dispatchEvent(new Event('change'));
                 });
                 updateTableSelectAllState();
             };
         
             const selectAll = document.getElementById('select-all');
             if (selectAll) {
                 selectAll.onchange = () => {
         if (isReadOnlyMode) {
         updateTableSelectAllState();
         return;
         }
         setBoxes(visibleNormalCards(), selectAll.checked);
         };
             }
         
             document.querySelectorAll('[data-col]').forEach(cb => {
                 cb.onchange = () => {
         if (isReadOnlyMode) {
         updateTableSelectAllState();
         return;
         }
         setBoxes(visibleNormalCardsByRole(cb.dataset.col), cb.checked);
         };
             });
         
             document.querySelectorAll('[data-row]').forEach(cb => {
                 cb.onchange = () => {
         if (isReadOnlyMode) {
         updateTableSelectAllState();
         return;
         }
         setBoxes(visibleNormalCardsByAttr(cb.dataset.row), cb.checked);
         };
             });
         
             document.querySelectorAll('.table-card input[type="checkbox"]:not(:disabled)').forEach(cb => {
                 cb.addEventListener('change', updateTableSelectAllState);
             });
         
             updateTableSelectAllState();
         }
         
         function setSelectControlState(control, boxes) {
             if (!control) return;
             const checkedCount = boxes.filter(cb => cb.checked).length;
             control.checked = boxes.length > 0 && checkedCount === boxes.length;
             control.indeterminate = checkedCount > 0 && checkedCount < boxes.length;
         }
         
         function updateTableSelectAllState() {
             const selectAll = document.getElementById('select-all');
             if (!selectAll) return;
         
             const visibleNormalCards = Array.from(document.querySelectorAll('.table-card:not(.hidden-by-filter) input[type="checkbox"]:not(:disabled)'));
             setSelectControlState(selectAll, visibleNormalCards);
         
             document.querySelectorAll('[data-col]').forEach(cb => {
                 const role = cb.dataset.col;
                 const boxes = Array.from(document.querySelectorAll(`.table-card:not(.hidden-by-filter)[data-role="${CSS.escape(role)}"] input[type="checkbox"]:not(:disabled)`));
                 setSelectControlState(cb, boxes);
             });
         
             document.querySelectorAll('[data-row]').forEach(cb => {
                 const attr = cb.dataset.row;
                 const boxes = Array.from(document.querySelectorAll(`.table-card:not(.hidden-by-filter)[data-attr="${CSS.escape(attr)}"] input[type="checkbox"]:not(:disabled)`));
                 setSelectControlState(cb, boxes);
             });
         }
         
         function escapeHtml(value) {
             return String(value ?? '')
                 .replace(/&/g, '&amp;')
                 .replace(/</g, '&lt;')
                 .replace(/>/g, '&gt;')
                 .replace(/"/g, '&quot;')
                 .replace(/'/g, '&#039;');
         }
         
         function getShareUrl() {
         const selectedIds = getCheckedIds();
         const baseUrl = window.location.href.split('?')[0];
         if (selectedIds.length === 0) return baseUrl;
         const key = encodeIdsToKey(selectedIds);
         return `${baseUrl}?k=${encodeURIComponent(key)}`;
         }
         
         function syncShareUrl() {
         const finalUrl = getShareUrl();
         document.getElementById('result-url').innerText = finalUrl;
         
         // 只更新畫面上的分享網址，不再改瀏覽器真實網址。
         saveToLocalStorage();
         return finalUrl;
         }
         
         function normalizeAttr(attr) {
             return String(attr ?? '');
         }
         
         function normalizeRole(role) {
             const value = String(role ?? '');
             return ROLE_ALIASES[value] || value;
         }
         
         function getCharacterId(char) {
             return Number(char.id ?? char['角色ID'] ?? char.character_id ?? char.chara_id);
         }
         
         function isFixedCharacterId(id) {
             return FIXED_CHARACTER_IDS.has(String(id));
         }
         
         function getCheckboxAttrs(id) {
             return isFixedCharacterId(id) ? ' checked disabled' : '';
         }
         
         function getCharacterName(char) {
             const langKeyMap = {
                 zh: ['zh', 'tw', 'zh_tw', 'zh-TW', 'zh_Hant', 'zh-hant', '繁中', '中文'],
                 ja: ['ja', 'jp', '日本語', '日文'],
                 en: ['en', '英文']
             };
             const fallbackKeys = ['zh', 'tw', 'zh_tw', 'zh-TW', 'zh_Hant', 'ja', 'jp', 'en'];
         
             if (char.name && typeof char.name === 'object') {
                 const preferredKeys = langKeyMap[currentLang] || ['zh'];
                 for (const key of preferredKeys) {
                     if (char.name[key]) return char.name[key];
                 }
                 for (const key of fallbackKeys) {
                     if (char.name[key]) return char.name[key];
                 }
                 return Object.values(char.name).find(Boolean) || '';
             }
         
             const flatNameMap = {
                 zh: ['name_zh', 'zh_name', 'name_tw', 'name_zh_tw', '角色名稱', '中文名稱'],
                 ja: ['name_ja', 'ja_name', 'name_jp', 'jp_name', '日文名稱'],
                 en: ['name_en', 'en_name', '英文名稱']
             };
             for (const key of (flatNameMap[currentLang] || flatNameMap.zh)) {
                 if (char[key]) return char[key];
             }
         
             return char.name ?? char['角色名稱'] ?? char.fullname ?? char.full_name ?? '';
         }
         
         function getCharacterAttr(char) {
             return char.attr ?? char['真屬性'] ?? '';
         }
         
         function getCharacterRole(char) {
             return normalizeRole(char['職種'] ?? char.role_name ?? char.role ?? '');
         }
         
         function getDateText(char) {
             if (char.note) return char.note;
             const date = char.date ?? char['開放時間'] ?? char.start_at ?? '';
             if (!date) return '';
             const shortDate = String(date).split('T')[0];
             return `${shortDate}`;
         }
         
         function saveFilterState() {
             localStorage.setItem(ATTR_FILTER_STORAGE_KEY, JSON.stringify(Array.from(activeAttrFilters)));
             localStorage.setItem(ROLE_FILTER_STORAGE_KEY, JSON.stringify(Array.from(activeRoleFilters)));
         }
         
         function loadFilterState() {
             try {
                 const savedAttrs = JSON.parse(localStorage.getItem(ATTR_FILTER_STORAGE_KEY) || '[]');
                 if (Array.isArray(savedAttrs)) activeAttrFilters = new Set(savedAttrs.map(normalizeAttr).filter(Boolean));
             } catch (error) {
                 activeAttrFilters = new Set();
             }
             try {
                 const savedRoles = JSON.parse(localStorage.getItem(ROLE_FILTER_STORAGE_KEY) || '[]');
                 if (Array.isArray(savedRoles)) activeRoleFilters = new Set(savedRoles.map(normalizeRole).filter(Boolean));
             } catch (error) {
                 activeRoleFilters = new Set();
             }
         }
         
         function updateFilterButtons() {
             document.querySelectorAll('[data-attr-filter]').forEach(btn => {
                 const filter = btn.dataset.attrFilter;
                 btn.classList.toggle('active', activeAttrFilters.has(normalizeAttr(filter)));
             });
             document.querySelectorAll('[data-role-filter]').forEach(btn => {
                 btn.classList.toggle('active', activeRoleFilters.has(normalizeRole(btn.dataset.roleFilter)));
             });
         }
         
         function applyFilters() {
             document.querySelectorAll('.item[data-attr]').forEach(item => {
                 const attr = normalizeAttr(item.dataset.attr);
                 const role = normalizeRole(item.dataset.role);
                 const matchAttr = activeAttrFilters.size === 0 || activeAttrFilters.has(attr);
                 const matchRole = activeRoleFilters.size === 0 || activeRoleFilters.has(role);
                 item.classList.toggle('hidden-by-filter', !(matchAttr && matchRole));
             });
             updateFilterButtons();
             updateTableSelectAllState();
         }
         
         function setupFilterButtons() {
             document.querySelectorAll('[data-attr-filter]').forEach(btn => {
                 btn.addEventListener('click', () => {
                     const filter = btn.dataset.attrFilter;
                     const attr = normalizeAttr(filter);
                     if (activeAttrFilters.has(attr)) activeAttrFilters.delete(attr);
                     else activeAttrFilters.add(attr);
                     saveFilterState();
                     applyFilters();
                 });
             });
         
             document.querySelectorAll('[data-role-filter]').forEach(btn => {
                 btn.addEventListener('click', () => {
                     const role = normalizeRole(btn.dataset.roleFilter);
                     if (activeRoleFilters.has(role)) activeRoleFilters.delete(role);
                     else activeRoleFilters.add(role);
                     saveFilterState();
                     applyFilters();
                 });
             });
         }
         
         function renderCharacters(characters) {
             if (currentView === 'icon') {
                 renderCharactersIcon(characters);
             } else if (currentView === 'table') {
                 renderCharactersTable(characters);
             } else {
                 renderCharactersList(characters);
             }
             updateViewButtons();
         }
         
         function renderCharactersList(characters) {
             const list = document.getElementById('dynamic-list');
             list.innerHTML = characters.map(char => {
                 const id = getCharacterId(char);
                 if (!Number.isFinite(id)) return '';
                 const attr = getCharacterAttr(char);
                 const role = getCharacterRole(char);
                 const roleIcon = ROLE_ICON_MAP[role] || '';
                 const dateText = getDateText(char);
                 const name = getCharacterName(char);
                 const image = char.image || `images/chara/${char.base_character_id}.png`;
                 return `
                     <div class="item${isFixedCharacterId(id) ? ' fixed' : ''}" data-attr="${escapeHtml(attr)}" data-role="${escapeHtml(role)}">
                         <div class="checkbox-wrapper">
                             <input type="checkbox" id="c${id}" class="char-cb${isFixedCharacterId(id) ? ' fixed-cb' : ''}"${getCheckboxAttrs(id)}>
                         </div>
                         <div class="info">
                             <label for="c${id}" class="main-line">
                                 <span class="attr-tag tag-${escapeHtml(attr)}">${escapeHtml(attr)}</span>
                                 ${roleIcon ? `<img class="role-icon" src="${roleIcon}" alt="${escapeHtml(ROLE_TEXT[currentLang][role] || role)}" title="${escapeHtml(ROLE_TEXT[currentLang][role] || role)}">` : ''}
                                 ${escapeHtml(name)}
                             </label>
                             <span class="date-line">${escapeHtml(dateText)}</span>
                         </div>
                         ${image ? `
                         <div class="char-image-wrapper">
                             <img 
                               class="char-image" 
                               src="${escapeHtml(image)}" 
                               alt="${escapeHtml(name)}" 
                               onerror="this.parentElement.style.display='none'"
                               >
                         </div>
                         ` : ''}
                     </div>
                 `;
             }).join('');
         }
         
         function renderCharactersIcon(characters) {
         const list = document.getElementById('dynamic-list');
         
         const attrIconMap = {
         '火': 'images/attr/f.1dbf47.png',
         '冰': 'images/attr/i.b647e3.png',
         '雷': 'images/attr/l.119818.png',
         '風': 'images/attr/w.d06628.png',
         '斬': 'images/attr/s.42817b.png',
         '打': 'images/attr/k.3148cc.png',
         '突': 'images/attr/t.ac73b3.png'
         };
         
         list.innerHTML = `
         <div class="icon-view">
            ${characters.map(char => {
                const id = getCharacterId(char);
                if (!Number.isFinite(id)) return '';
         
                const attr = getCharacterAttr(char);
                const role = getCharacterRole(char);
                const name = getCharacterName(char);
                const dateText = getDateText(char);
                const image = char.image || `images/chara/${char.base_character_id}.png`;
                const roleIcon = ROLE_ICON_MAP[role] || '';
                const attrIcon = attrIconMap[attr] || '';
         
                return `
                    <div class="item icon-card${isFixedCharacterId(id) ? ' fixed' : ''}"
                         data-attr="${escapeHtml(attr)}"
                         data-role="${escapeHtml(role)}"
                         title="${escapeHtml(name)}｜${escapeHtml(dateText)}">
         
                        <input type="checkbox"
                               id="c${id}"
                               class="char-cb${isFixedCharacterId(id) ? ' fixed-cb' : ''}"
                               ${getCheckboxAttrs(id)}
                               onchange="this.closest('.icon-card')?.classList.toggle('owned', this.checked)">
         
                        <img class="icon-card-image"
                             src="${escapeHtml(image)}"
                             alt="${escapeHtml(name)}"
                             onerror="this.style.display='none'">
         
                        ${attrIcon ? `<img class="icon-card-attr" src="${attrIcon}" alt="${escapeHtml(attr)}">` : ''}
                        ${roleIcon ? `<img class="icon-card-role" src="${roleIcon}" alt="${escapeHtml(ROLE_TEXT[currentLang][role] || role)}">` : ''}
                    </div>
                `;
            }).join('')}
         </div>
         `;
         }
         function renderCharactersTable(characters) {
             const list = document.getElementById('dynamic-list');
             const attrOrder = ['火', '冰', '雷', '風', '斬', '打', '突'];
             const roleOrder = ['攻擊者', '破防者', '防禦者', '支援者'];
             const attrIconMap = {
                 '火': 'images/attr/f.1dbf47.png',
                 '冰': 'images/attr/i.b647e3.png',
                 '雷': 'images/attr/l.119818.png',
                 '風': 'images/attr/w.d06628.png',
                 '斬': 'images/attr/s.42817b.png',
                 '打': 'images/attr/k.3148cc.png',
                 '突': 'images/attr/t.ac73b3.png'
             };
         
             const groups = new Map();
             attrOrder.forEach(attr => {
                 roleOrder.forEach(role => {
                     groups.set(`${attr}|${role}`, []);
                 });
             });
         
             characters.forEach(char => {
                 const attr = getCharacterAttr(char);
                 const role = getCharacterRole(char);
                 const key = `${attr}|${role}`;
                 if (!groups.has(key)) groups.set(key, []);
                 groups.get(key).push(char);
             });
         
             const renderCard = (char, attr) => {
                 const id = getCharacterId(char);
                 if (!Number.isFinite(id)) return '';
                 const role = getCharacterRole(char);
                 const roleIcon = ROLE_ICON_MAP[role] || '';
                 const name = getCharacterName(char);
                 const image = char.image || `images/chara/${char.base_character_id}.png`;
         
                 return `
                     <div class="item table-card${isFixedCharacterId(id) ? ' fixed' : ''}" data-attr="${escapeHtml(attr)}" data-role="${escapeHtml(role)}" title="${escapeHtml(name)}">
                         <input type="checkbox"
         id="c${id}"
         class="char-cb${isFixedCharacterId(id) ? ' fixed-cb' : ''}"
         ${getCheckboxAttrs(id)}
         onchange="this.closest('.table-card')?.classList.toggle('owned', this.checked)">
         
                         <div class="card-image">
                             <img
                                 src="${escapeHtml(image)}"
                                 alt="${escapeHtml(name)}"
                                 onerror="this.parentElement.style.display='none'"
                             >
                         </div>
         
                         ${roleIcon ? `<img class="card-role" src="${roleIcon}" alt="${escapeHtml(ROLE_TEXT[currentLang][role] || role)}" title="${escapeHtml(ROLE_TEXT[currentLang][role] || role)}">` : ''}
                     </div>
                 `;
             };
         
             list.innerHTML = `
                 <div class="table-view">
                     <div class="matrix-table">
                         <div class="matrix-cell matrix-head">
                             <label class="select-label select-all-label" title="全表格全選">
                                 <input type="checkbox" id="select-all">
                                 <span data-i18n="selectAll">全選</span>
                             </label>
                         </div>
                         ${roleOrder.map(role => `
                             <div class="matrix-cell matrix-head">
                                 <div class="matrix-title-line">
                                     ${ROLE_ICON_MAP[role] ? `<img src="${ROLE_ICON_MAP[role]}" alt="${escapeHtml(ROLE_TEXT[currentLang][role] || role)}">` : ''}
                                     <span>${escapeHtml(ROLE_TEXT[currentLang][role] || role)}</span>
                                 </div>
                                 <label class="select-label role-select-label" title="${escapeHtml(role)}全選">
                                     <input type="checkbox" data-col="${escapeHtml(role)}">
                                     <span data-i18n="selectAll">全選</span>
                                 </label>
                             </div>
                         `).join('')}
         
                         ${attrOrder.map(attr => `
                             <div class="matrix-cell matrix-attr">
                                 <div class="attr-title-line">
                                     <img src="${attrIconMap[attr]}" alt="${escapeHtml(attr)}">
                                     <span>${escapeHtml(attr)}</span>
                                 </div>
                                 <label class="select-label attr-select-label" title="${escapeHtml(attr)}屬性全選">
                                     <input type="checkbox" data-row="${escapeHtml(attr)}">
                                     <span data-i18n="selectAll">全選</span>
                                 </label>
                             </div>
                             ${roleOrder.map(role => {
                                 const chars = groups.get(`${attr}|${role}`) || [];
                                 return `
                                     <div class="matrix-cell matrix-slot">
                                         ${chars.length ? chars.map(char => renderCard(char, attr)).join('') : '<div class="matrix-empty">—</div>'}
                                     </div>
                                 `;
                             }).join('')}
                         `).join('')}
                     </div>
                 </div>
             `;
         }
         
         function getNormalCheckboxes() {
         return Array.from(document.querySelectorAll('.char-cb'))
         .filter(cb => !cb.classList.contains('fixed-cb'));
         }
         
         function getCheckedIds() {
             return getNormalCheckboxes()
                 .filter(cb => cb.checked)
                 .map(cb => cb.id.replace('c', ''))
                 .sort((a, b) => Number(a) - Number(b));
         }
         
         function setCheckedIds(ids) {
             const idSet = new Set(ids.map(String));
             document.querySelectorAll('.char-cb').forEach(cb => {
                 const id = cb.id.replace('c', '');
                 if (isFixedCharacterId(id)) {
                     cb.checked = true;
                     cb.disabled = true;
                 } else {
                     cb.checked = idSet.has(id);
                 }
             });
         }
         
         function saveToLocalStorage() {
             localStorage.setItem(STORAGE_KEY, JSON.stringify(getCheckedIds()));
         }
         
         function loadFromLocalStorage() {
             const saved = localStorage.getItem(STORAGE_KEY);
             if (!saved) return false;
             try {
                 const ids = JSON.parse(saved);
                 if (!Array.isArray(ids)) return false;
                 setCheckedIds(ids);
                 return true;
             } catch (error) {
                 console.warn('讀取本機儲存失敗，已忽略舊資料。', error);
                 return false;
             }
         }
         
         function bigIntToBaseX(value) {
         if (value === 0n) return '0';
         
         let result = '';
         let n = value;
         const base = BigInt(BASE_CHARS.length);
         
         while (n > 0n) {
         const index = Number(n % base);
         result = BASE_CHARS[index] + result;
         n = n / base;
         }
         
         return result;
         }
         
         function parseBaseXToBigInt(value) {
         let result = 0n;
         const base = BigInt(BASE_CHARS.length);
         
         for (const ch of String(value)) {
         const digit = BASE_CHARS.indexOf(ch);
         if (digit < 0) throw new Error('Invalid key');
         result = result * base + BigInt(digit);
         }
         
         return result;
         }
         
         function encodeIdsToKey(ids) {
         let bits = 0n;
         ids.forEach(id => {
         const n = BigInt(Number(id));
         if (n >= 0n) bits |= (1n << n);
         });
         return bigIntToBaseX(bits);
         }
         
         function decodeKeyToIds(key) {
         if (!key || key === '0') return [];
         const bits = parseBaseXToBigInt(key);
         const maxId = Math.max(0, ...getNormalCheckboxes().map(cb => Number(cb.id.replace('c', ''))));
         const ids = [];
         for (let i = 0; i <= maxId; i++) {
         if ((bits & (1n << BigInt(i))) !== 0n) ids.push(String(i));
         }
         return ids;
         }
         
         function resetTable() {
             if (confirm('確定要重置所有勾選嗎？')) {
                 setCheckedIds([]);
                 syncOwnedState(); 
                 updateTableSelectAllState();
                 localStorage.removeItem(STORAGE_KEY);
                 syncShareUrl();
             }
         }
         function clearAllFilters() {
             if (!confirm('確定要清除所有篩選嗎？')) return;
             activeAttrFilters.clear();
             activeRoleFilters.clear();
             saveFilterState();
             applyFilters();
         }
         async function copyUrl() {
         const btn = document.getElementById('copy-btn');
         
         const urlText = getShareUrl();
         document.getElementById('result-url').innerText = urlText;
         saveToLocalStorage();
         
         try {
         await navigator.clipboard.writeText(urlText);
         
         // ✅ 成功 → 變勾勾
         btn.innerHTML = "✔";
         btn.style.backgroundColor = "#22c55e";
         
         setTimeout(() => {
            btn.innerHTML = `<img src="images/ui/copy.png" alt="${(UI_TEXT[currentLang] || UI_TEXT.zh).copy}">`;
            btn.title = (UI_TEXT[currentLang] || UI_TEXT.zh).copy;
            btn.style.backgroundColor = "";
         }, 1000);
         
         } catch (error) {
         prompt('瀏覽器無法自動複製，請手動複製：', urlText);
         }
         }
         
         function loadFromUrl() {
         const params = new URLSearchParams(window.location.search);
         const key = params.get('k');
         const legacyChars = params.get('chars');
         
         if (key !== null) {
         isReadOnlyMode = true;
         
         try {
            const ids = decodeKeyToIds(key);
            setCheckedIds(ids);
            syncShareUrl();
            return true;
         } catch (error) {
            console.warn('網址短碼解析失敗，已改用本機記錄。', error);
            return false;
         }
         }
         
         if (legacyChars !== null) {
         const ids = legacyChars.split(',').map(id => id.trim()).filter(Boolean);
         
         setCheckedIds(ids);
         saveToLocalStorage();
         syncShareUrl();
         
         return true;
         }
         
         return false;
         }
         
         async function init() {
             applyTheme();
             setupLanguageSelect();
             applyUiLanguage();
             setupViewButtons();
             document.body.setAttribute("data-view", currentView);
             setupFilterButtons();
             loadFilterState();
             updateFilterButtons();
             try {
                 const response = await fetch(DATA_FILE, { cache: 'no-store' });
                 if (!response.ok) throw new Error(`HTTP ${response.status}`);
                 allCharacters = await response.json();
                 allCharacters.sort((a, b) => new Date(b.date) - new Date(a.date));
                 renderCharacters(allCharacters);
                 applyUiLanguage();
                 applyFilters();
                 
                 applyReadOnlyMode();  // ← 閱讀模式放這裡 ✔
                 
                 setTimeout(() => {
                 const seen = localStorage.getItem(PATCH_NOTE_KEY);
                 
                 if (!seen) {
                 	togglePatchNote();   // 第一次 → 打開 + 載入
                 	} else {
                 	loadPatchNotes();    // 已看過 → 只載入（為了紅點）
                 	}
                 }, 500);
                 
                 const loadedFromUrl = loadFromUrl();
                 if (!loadedFromUrl) {
                     loadFromLocalStorage();
                     syncShareUrl();
                 }
                 syncOwnedState();
         applyReadOnlyMode();
                 bindCheckboxEvents();
                 setupCardClickEvents();
                 setupTableSelectAll();
             } catch (error) {
                 console.error(error);
                 document.getElementById('dynamic-list').innerHTML = '<div class="error">讀取 characters.json 失敗，請確認 index.html 和 characters.json 放在同一個資料夾。</div>';
                 document.getElementById('result-url').innerText = '資料讀取失敗';
             }
         }
         
         document.addEventListener('DOMContentLoaded', init);
         /* ===== 閱讀模式 設定 ===== */
         function saveSharedList() {
         isReadOnlyMode = false;
         
         saveToLocalStorage();   // 把目前（分享來的）存成本機
         
         applyReadOnlyMode();    // 隱藏提示
         syncShareUrl();         // 更新網址
         }
         
         function discardSharedList() {
         isReadOnlyMode = false;
         
         loadFromLocalStorage();     // 載回自己的資料
         syncOwnedState();           // UI同步
         updateTableSelectAllState();// 表格同步
         
         applyReadOnlyMode();        // 隱藏提示
         syncShareUrl();             // 更新網址
         }
         
         // ===== Patch Note =====
         const PATCH_NOTE_FILE = 'patch_notes.json';
         const PATCH_NOTE_KEY = 'patch_note_seen';
         let patchNoteVersion = null;
         let patchNoteLoaded = false;
         
         function renderDetail(detail) {
             if (typeof detail === 'string') {
             return escapeHtml(detail);
             }
             if (detail.type === 'link') {
             return `<a href="${escapeHtml(detail.url)}" target="_blank" rel="noopener noreferrer">
             ${escapeHtml(detail.text)}</a>`;
             }
             
             const labelMap = {
             new: 'NEW',
             fix: 'FIX',
             improve: 'UPD'
             };
             
             if (labelMap[detail.type]) {
             return `<span class="patch-badge patch-${detail.type}">${labelMap[detail.type]}</span>
             ${escapeHtml(detail.content || '')}`;
             }
             
             return escapeHtml(detail.content || '');
             }
         
         function togglePatchNote() {
             const panel = document.getElementById('patch-note-panel');
             if (!panel) return;
         
             panel.classList.toggle('hidden');
         
             if (!panel.classList.contains('hidden')) {
                 if (!patchNoteLoaded) {
                     loadPatchNotes();
                 }
         
                 if (patchNoteVersion) {
                     localStorage.setItem(PATCH_NOTE_KEY, patchNoteVersion);
                     updatePatchDot();
                 }
             }
         }
         
         async function loadPatchNotes() {
             const content = document.getElementById('patch-note-content');
             if (!content) return;
         
             try {
                 const response = await fetch(PATCH_NOTE_FILE, { cache: 'no-store' });
                 if (!response.ok) throw new Error(`HTTP ${response.status}`);
         
                 const data = await response.json();
                 patchNoteVersion = data.version;
                 const notes = data.notes || [];
         
                 content.innerHTML = notes.map(note => `
                     <div class="patch-note-entry">
                         <div class="patch-note-date">${escapeHtml(note.date || '')}</div>
                         <strong>${escapeHtml(note.title || '')}</strong>
         
                         <ul class="patch-main-list">
                             ${(note.items || []).map(item => `
                                 <li>
                                     <span>${escapeHtml(item.text || '')}</span>
         
                                     ${(item.details || []).length ? `
                                         <ul class="patch-sub-list">
                                             ${item.details.map(detail => `
                                                 <li>${renderDetail(detail)}</li>
                                                 `).join('')}
                                         </ul>
                                     ` : ''}
                                 </li>
                             `).join('')}
                         </ul>
                     </div>
                 `).join('');
         
                 patchNoteLoaded = true;
                 updatePatchDot();
         
             } catch (error) {
                 console.error(error);
                 content.innerHTML = '<div class="error">Patch Note 讀取失敗</div>';
             }
         }
         
         function updatePatchDot() {
             const btn = document.getElementById('patch-note-btn');
             if (!btn || !patchNoteVersion) return;
         
             const seen = localStorage.getItem(PATCH_NOTE_KEY);
         
             if (seen !== patchNoteVersion) {
                 btn.classList.add('has-update');
             } else {
                 btn.classList.remove('has-update');
             }
         }
         
         function goHome() {
         window.location.href = window.location.origin + window.location.pathname;
         }
      </script>
   </body>
